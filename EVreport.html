<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>廠商試吃活動結案報告產生器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            /* 避免手機瀏覽器底部拉動時出現多餘空白 */
            overscroll-behavior-y: none;
        }
        
        /* 固定的像素尺寸 (794px * 1123px 約為 A4 96dpi 尺寸)，確保手機縮放計算精準 */
        .a4-container {
            width: 794px;
            min-height: 1123px;
            background: white;
            padding: 40px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            margin: 0 auto;
            box-sizing: border-box;
            /* 預設基準點改為左上方，配合 JavaScript 動態計算防止跑版 */
            transform-origin: top left; 
        }
        
        /* 保留使用者輸入的換行符號 */
        .keep-breaks {
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.6;
        }
        
        /* 簽名字體 */
        .signature-font {
            font-family: 'Noto Serif TC', serif;
            font-style: italic;
        }

        /* 隱藏捲軸但保留滾動功能 (美化介面) */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  
            scrollbar-width: none;  
        }
    </style>
</head>
<!-- 加入 pb-20 確保手機端底部 Tab bar 不會擋住內容 -->
<body class="bg-slate-100 min-h-screen pb-20 lg:pb-8">

    <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8 flex flex-col lg:flex-row gap-8">
        
        <!-- ================= 左側/編輯模式：輸入表單區 ================= -->
        <div id="form-section" class="w-full lg:w-1/3 bg-white p-6 rounded-xl shadow-sm border border-gray-200 h-fit lg:sticky lg:top-8 overflow-y-auto no-scrollbar" style="max-height: calc(100vh - 4rem);">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                <svg class="w-6 h-6 mr-2 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                宣傳試吃報告輸入
            </h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">活動名稱</label>
                    <input type="text" id="input-eventName" class="w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500" value="" placeholder="請輸入活動名稱" oninput="updatePreview()">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">已合作廠商名稱</label>
                        <input type="text" id="input-vendorName" class="w-full border border-gray-300 rounded-md p-2" value="" placeholder="請輸入廠商名稱" oninput="updatePreview()">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">活動日期</label>
                        <input type="date" id="input-date" class="w-full border border-gray-300 rounded-md p-2" value="" oninput="updatePreview()">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">主打品項</label>
                    <input type="text" id="input-items" class="w-full border border-gray-300 rounded-md p-2" value="" placeholder="請輸入試吃品項" oninput="updatePreview()">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">試吃活動優惠內容 (支援換行)</label>
                    <textarea id="input-promo" rows="2" class="w-full border border-gray-300 rounded-md p-2" placeholder="請輸入優惠方案..." oninput="updatePreview()"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">廠商積極度</label>
                        <select id="input-proactive" class="w-full border border-gray-300 rounded-md p-2" onchange="updatePreview()">
                            <option value="" disabled selected>請選擇</option>
                            <option value="★★★★★ (極佳)">★★★★★ (極佳)</option>
                            <option value="★★★★☆ (良好)">★★★★☆ (良好)</option>
                            <option value="★★★☆☆ (普通)">★★★☆☆ (普通)</option>
                            <option value="★★☆☆☆ (消極)">★★☆☆☆ (消極)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">優先安排意願</label>
                        <select id="input-priority" class="w-full border border-gray-300 rounded-md p-2" onchange="updatePreview()">
                            <option value="" disabled selected>請選擇</option>
                            <option value="⭐⭐⭐ 極高 (優先排程)">⭐⭐⭐ 極高 (優先排程)</option>
                            <option value="⭐⭐ 普通 (正常排程)">⭐⭐ 普通 (正常排程)</option>
                            <option value="⭐ 較低 (暫緩排程)">⭐ 較低 (暫緩排程)</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">現場反應與成效 (支援換行)</label>
                    <textarea id="input-pros" rows="3" class="w-full border border-gray-300 rounded-md p-2" placeholder="請輸入現場反應..." oninput="updatePreview()"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">需協助或改善事項 (支援換行)</label>
                    <textarea id="input-cons" rows="2" class="w-full border border-gray-300 rounded-md p-2" placeholder="請輸入改善建議..." oninput="updatePreview()"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">記錄人姓名</label>
                    <input type="text" id="input-recorder" class="w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500" value="" placeholder="請輸入您的姓名" oninput="updatePreview()">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">上傳現場照片 (最多6張，僅本機處理)</label>
                    <input type="file" id="input-photos" accept="image/*" multiple class="w-full border border-gray-300 rounded-md p-2 text-sm" onchange="handleImageUpload(event)">
                </div>
            </div>

            <div class="mt-8">
                <!-- 僅保留 PNG 匯出 -->
                <button onclick="exportToPNG()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 flex items-center justify-center shadow-md text-lg">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    匯出結案報告 (PNG)
                </button>
            </div>
        </div>

        <!-- ================= 右側/預覽模式：報告預覽區 ================= -->
        <!-- 移除了原本的 items-center 避免在手機上造成 Flex 偏移計算錯誤 -->
        <div id="preview-section" class="w-full lg:w-2/3 flex flex-col max-lg:hidden">
            
            <!-- 手機版專屬：在預覽區上方也放一個匯出按鈕，方便預覽後直接存檔 -->
            <div class="w-full mb-4 lg:hidden">
                <button onclick="exportToPNG()" class="w-full bg-blue-600 active:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg flex items-center justify-center shadow-md">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    儲存圖片至手機相簿
                </button>
            </div>

            <!-- 移除了原本的 items-center -->
            <div id="preview-wrapper" class="w-full overflow-hidden flex flex-col">
                <!-- a4-container 擁有 margin: 0 auto; 所以在電腦版依然會置中 -->
                <div id="report-preview" class="a4-container relative flex flex-col bg-white shrink-0">
                    <div class="absolute inset-0 flex items-center justify-center pointer-events-none z-0 opacity-[0.08]">
                        <img src="https://raw.githubusercontent.com/OrangeSmall/seafood-menu-app/main/logo.png" crossorigin="anonymous" class="w-3/4 max-w-md object-contain" alt="Watermark">
                    </div>

                    <div class="absolute top-0 left-0 w-full h-3 bg-teal-600 z-10"></div>
                    
                    <div class="mt-4 border-b-2 border-gray-800 pb-2 mb-3 relative z-10">
                        <h1 class="text-2xl font-bold text-center text-gray-800 tracking-wider leading-relaxed min-h-[2rem]" id="preview-eventName"></h1>
                        <h2 class="text-lg font-bold text-center text-gray-600 mt-1 leading-normal">合作廠商試吃活動紀錄</h2>
                    </div>

                    <div class="grid grid-cols-2 gap-y-4 gap-x-6 mb-4 bg-gray-50/90 p-4 rounded-lg border border-gray-200 relative z-10 backdrop-blur-sm">
                        <div>
                            <span class="text-gray-500 font-bold text-xs block mb-1">廠商名稱</span>
                            <p class="text-base font-bold text-gray-800 leading-normal min-h-[1.5rem]" id="preview-vendorName"></p>
                        </div>
                        <div>
                            <span class="text-gray-500 font-bold text-xs block mb-1">活動日期</span>
                            <p class="text-base text-gray-800 leading-normal min-h-[1.5rem]" id="preview-date"></p>
                        </div>
                        <div class="col-span-2">
                            <span class="text-gray-500 font-bold text-xs block mb-1">主打品項</span>
                            <p class="text-base text-gray-800 leading-normal min-h-[1.5rem]" id="preview-items"></p>
                        </div>
                        <div class="col-span-2 mt-1">
                            <span class="text-teal-700 font-bold text-xs border-b border-teal-200 inline-block mb-2 pb-1">活動優惠內容</span>
                            <p class="text-base text-teal-900 keep-breaks min-h-[1.5rem]" id="preview-promo"></p>
                        </div>
                    </div>

                    <div class="space-y-4 flex-grow relative z-10">
                        <div class="flex flex-row gap-4 bg-yellow-50/90 p-4 rounded border border-yellow-200 backdrop-blur-sm">
                            <div class="flex-1">
                                <span class="text-gray-600 font-bold text-xs block mb-1">廠商積極度</span>
                                <p class="text-lg text-yellow-600 tracking-wider font-medium leading-normal min-h-[1.75rem]" id="preview-proactive"></p>
                            </div>
                            <div class="flex-1 border-l border-yellow-300 pl-4">
                                <span class="text-gray-600 font-bold text-xs block mb-1">後續優先安排意願</span>
                                <p class="text-lg text-gray-900 font-medium leading-normal min-h-[1.75rem]" id="preview-priority"></p>
                            </div>
                        </div>

                        <div>
                            <h3 class="text-base font-bold text-teal-700 border-l-4 border-teal-600 pl-2 mb-2">現場反應與成效</h3>
                            <div class="keep-breaks text-sm text-gray-700 leading-relaxed bg-white/90 p-2 border border-gray-100 rounded shadow-sm backdrop-blur-sm min-h-[3rem]" id="preview-pros"></div>
                        </div>

                        <div>
                            <h3 class="text-base font-bold text-orange-600 border-l-4 border-orange-500 pl-2 mb-2">需協助或改善事項</h3>
                            <div class="keep-breaks text-sm text-gray-700 leading-relaxed bg-white/90 p-2 border border-gray-100 rounded shadow-sm backdrop-blur-sm min-h-[2.5rem]" id="preview-cons"></div>
                        </div>

                        <div>
                            <h3 class="text-base font-bold text-gray-800 border-l-4 border-gray-700 pl-2 mb-2">活動現場照片</h3>
                            <div id="preview-photos" class="grid grid-cols-3 gap-3 mt-2 min-h-[6rem]">
                            </div>
                        </div>
                    </div>

                    <!-- 記錄人簽名區與左側 Logo -->
                    <div class="mt-6 pt-4 border-t border-gray-300 flex justify-between items-end relative z-10">
                        <!-- 左側 Logo：高度參考右側簽名區，並加上微透明質感 -->
                        <div class="pb-2 pl-2">
                            <img src="https://raw.githubusercontent.com/OrangeSmall/seafood-menu-app/main/logo.png" crossorigin="anonymous" class="h-16 object-contain opacity-90" alt="Logo">
                        </div>

                        <!-- 右側簽名區 -->
                        <div class="w-56">
                            <p class="text-gray-500 font-bold mb-2 text-xs">活動紀錄人：</p>
                            <div class="border-b border-gray-400 h-16 flex items-end justify-center pb-2">
                                <span id="preview-recorder" class="signature-font text-3xl font-bold text-black tracking-widest inline-block transform -rotate-2 min-h-[2.25rem] w-full text-center"></span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 最下方頁尾浮水文字 -->
                    <div class="absolute bottom-4 left-0 w-full flex justify-center z-10">
                        <span class="text-[10px] text-gray-300 tracking-widest uppercase">Generated by 小橘</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= 手機版專屬：底部導航切換列 ================= -->
    <div class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 flex lg:hidden z-50 shadow-[0_-2px_10px_rgba(0,0,0,0.05)] pb-safe">
        <button id="tab-edit" onclick="switchMode('edit')" class="flex-1 py-4 text-center font-bold text-blue-600 border-b-4 border-blue-600 bg-blue-50 transition-colors">
            📝 編輯資料
        </button>
        <button id="tab-preview" onclick="switchMode('preview')" class="flex-1 py-4 text-center font-bold text-gray-500 border-b-4 border-transparent bg-white transition-colors">
            👁️ 預覽與匯出
        </button>
    </div>

    <script>
        // 等待字體載入
        document.fonts.ready.then(() => {
            console.log("字體已加載完成");
            updatePreviewScale(); 
        });

        // ====== 核心功能 1：手機版 / 電腦版 畫面切換 ======
        function switchMode(mode) {
            const formSection = document.getElementById('form-section');
            const previewSection = document.getElementById('preview-section');
            const tabEdit = document.getElementById('tab-edit');
            const tabPreview = document.getElementById('tab-preview');

            if (mode === 'edit') {
                // 顯示表單，隱藏預覽
                formSection.classList.remove('max-lg:hidden');
                previewSection.classList.add('max-lg:hidden');
                
                // 更新按鈕樣式
                tabEdit.className = "flex-1 py-4 text-center font-bold text-blue-600 border-b-4 border-blue-600 bg-blue-50 transition-colors";
                tabPreview.className = "flex-1 py-4 text-center font-bold text-gray-500 border-b-4 border-transparent bg-white transition-colors";
            } else {
                // 顯示預覽，隱藏表單
                formSection.classList.add('max-lg:hidden');
                previewSection.classList.remove('max-lg:hidden');
                
                // 更新按鈕樣式
                tabPreview.className = "flex-1 py-4 text-center font-bold text-blue-600 border-b-4 border-blue-600 bg-blue-50 transition-colors";
                tabEdit.className = "flex-1 py-4 text-center font-bold text-gray-500 border-b-4 border-transparent bg-white transition-colors";
                
                // 重要：切換到預覽畫面時，必須重新計算縮放比例
                setTimeout(updatePreviewScale, 50);
            }
            // 切換時自動回到最上方
            window.scrollTo(0, 0);
        }

        // ====== 核心功能 2：手機版自動縮放預覽區 (已修正跑版問題) ======
        function updatePreviewScale() {
            const wrapper = document.getElementById('preview-wrapper');
            const preview = document.getElementById('report-preview');
            // 如果預覽區被隱藏 (clientWidth = 0)，就不進行計算
            if (!wrapper || wrapper.clientWidth === 0) return;

            const availableWidth = wrapper.clientWidth;
            const targetWidth = 794; 

            if (availableWidth < targetWidth) {
                // 畫面過窄時：確保以「左上角」為縮放基準，避免 Flexbox 居中與縮放產生偏移衝突
                const scale = availableWidth / targetWidth;
                preview.style.transformOrigin = 'top left'; 
                preview.style.transform = `scale(${scale})`;
                wrapper.style.height = `${preview.offsetHeight * scale}px`;
            } else {
                // 寬螢幕時：取消縮放，並讓容器的 margin: 0 auto; 自然居中
                preview.style.transformOrigin = 'top center';
                preview.style.transform = 'none';
                wrapper.style.height = 'auto';
            }
        }

        window.addEventListener('resize', updatePreviewScale);

        // 實時更新預覽區資料
        function updatePreview() {
            document.getElementById('preview-eventName').innerText = document.getElementById('input-eventName').value || '\u200B';
            document.getElementById('preview-vendorName').innerText = document.getElementById('input-vendorName').value || '\u200B';
            document.getElementById('preview-date').innerText = document.getElementById('input-date').value || '\u200B';
            document.getElementById('preview-items').innerText = document.getElementById('input-items').value || '\u200B';
            document.getElementById('preview-promo').innerText = document.getElementById('input-promo').value || '\u200B';
            
            const proactive = document.getElementById('input-proactive').value;
            document.getElementById('preview-proactive').innerText = proactive || '\u200B';
            
            const priority = document.getElementById('input-priority').value;
            document.getElementById('preview-priority').innerText = priority || '\u200B';
            
            document.getElementById('preview-pros').innerText = document.getElementById('input-pros').value || '\u200B';
            document.getElementById('preview-cons').innerText = document.getElementById('input-cons').value || '\u200B';
            
            document.getElementById('preview-recorder').innerText = document.getElementById('input-recorder').value || '\u200B';
            
            setTimeout(updatePreviewScale, 50);
        }

        // 處理照片上傳
        function handleImageUpload(event) {
            const files = event.target.files;
            const previewContainer = document.getElementById('preview-photos');
            previewContainer.innerHTML = ''; 
            
            if (files.length === 0) {
                setTimeout(updatePreviewScale, 50);
                return;
            }

            const maxFiles = Math.min(files.length, 6);
            let loadedCount = 0;
            
            for (let i = 0; i < maxFiles; i++) {
                const file = files[i];
                if (!file.type.startsWith('image/')){ 
                    loadedCount++;
                    continue; 
                }
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imgContainer = document.createElement('div');
                    imgContainer.className = 'w-full h-24 border border-gray-200 rounded-lg overflow-hidden bg-gray-100 flex items-center justify-center';
                    
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'max-w-full max-h-full object-contain';
                    
                    imgContainer.appendChild(img);
                    previewContainer.appendChild(imgContainer);

                    loadedCount++;
                    if(loadedCount === maxFiles) {
                        setTimeout(updatePreviewScale, 50);
                    }
                }
                reader.readAsDataURL(file); 
            }
        }

        // ====== 核心功能 3：無痛匯出與儲存相簿機制 ======
        
        // 建立防呆長按儲存視窗 (Fallback for mobile without share API)
        function showMobileSaveModal(dataUrl) {
            const overlay = document.createElement('div');
            overlay.className = 'fixed inset-0 z-[100] bg-black/95 flex flex-col items-center justify-center p-4 backdrop-blur-sm';
            
            const closeBtn = document.createElement('button');
            closeBtn.className = 'absolute top-6 right-6 text-white text-xl font-bold bg-white/20 rounded-full w-10 h-10 flex items-center justify-center hover:bg-white/30';
            closeBtn.innerHTML = '✕';
            closeBtn.onclick = () => document.body.removeChild(overlay);
            
            const hint = document.createElement('div');
            hint.className = 'text-white text-lg mb-6 font-bold text-center animate-bounce';
            hint.innerHTML = '👇 請「長按」下方圖片<br>並選擇「儲存到相簿」或「分享」';
            
            const imgContainer = document.createElement('div');
            imgContainer.className = 'overflow-y-auto max-h-[75vh] w-full rounded-lg shadow-2xl';
            
            const img = document.createElement('img');
            img.src = dataUrl;
            img.className = 'w-full h-auto object-contain';
            
            imgContainer.appendChild(img);
            overlay.appendChild(closeBtn);
            overlay.appendChild(hint);
            overlay.appendChild(imgContainer);
            document.body.appendChild(overlay);
        }

        // 執行匯出處理
        function exportToPNG() {
            const element = document.getElementById('report-preview');
            const btns = document.querySelectorAll('button[onclick="exportToPNG()"]');
            const originalTexts = [];
            
            btns.forEach((btn, index) => {
                originalTexts[index] = btn.innerHTML;
                btn.innerHTML = '處理中...';
            });
            
            // 截圖前暫時解除縮放，確保匯出的是原始 A4 高畫質尺寸
            const originalTransform = element.style.transform;
            const originalOrigin = element.style.transformOrigin;
            element.style.transform = 'none';

            html2canvas(element, {
                scale: 2, 
                useCORS: true,
                backgroundColor: '#ffffff',
                windowWidth: 794
            }).then(canvas => {
                element.style.transform = originalTransform;
                element.style.transformOrigin = originalOrigin;

                const vendorName = document.getElementById('input-vendorName').value || '未命名';
                const fileName = `宣傳活動紀錄-${vendorName}.png`;
                const dataUrl = canvas.toDataURL('image/png');

                const restoreBtns = () => {
                    btns.forEach((btn, index) => {
                        btn.innerHTML = originalTexts[index];
                    });
                };

                // 判斷該採取何種存檔策略
                const performFallback = () => {
                    if (window.innerWidth < 1024) {
                        // 手機版：彈出提示長按儲存的視窗
                        showMobileSaveModal(dataUrl);
                    } else {
                        // 電腦版：走傳統下載模式
                        const link = document.createElement('a');
                        link.download = fileName;
                        link.href = dataUrl;
                        link.click();
                    }
                    restoreBtns();
                };

                // 嘗試使用手機原生 Web Share API 呼叫「分享與儲存選單」
                try {
                    canvas.toBlob(blob => {
                        if (!blob) {
                            performFallback();
                            return;
                        }
                        const file = new File([blob], fileName, { type: 'image/png' });
                        
                        // 檢查設備是否支援檔案分享
                        if (navigator.canShare && navigator.canShare({ files: [file] })) {
                            navigator.share({
                                files: [file],
                                title: '試吃活動結案報告'
                            }).then(() => {
                                console.log('已開啟原生分享/儲存選單');
                                restoreBtns();
                            }).catch(err => {
                                console.log('分享取消或失敗:', err);
                                // 如果不是因為使用者主動按取消而導致的錯誤，則啟動備案
                                if (err.name !== 'AbortError') {
                                    performFallback();
                                } else {
                                    restoreBtns();
                                }
                            });
                        } else {
                            // 不支援 Web Share API 時走備案
                            performFallback();
                        }
                    }, 'image/png');
                } catch (e) {
                    performFallback();
                }

            }).catch(err => {
                element.style.transform = originalTransform;
                element.style.transformOrigin = originalOrigin;
                console.error('導出失敗:', err);
                alert('圖片導出處理失敗，請再試一次。');
                btns.forEach((btn, index) => {
                    btn.innerHTML = originalTexts[index];
                });
            });
        }

        // 初始載入
        updatePreview();
        setTimeout(updatePreviewScale, 100);
    </script>
</body>
</html>
