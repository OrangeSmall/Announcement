    :root{

      --paper:#f6f7fb;

      --radius:18px;
    }
    *{ box-sizing:border-box; }

    .wrap{ max-width: 980px; margin: 0 auto; padding: 14px 12px 26px; }

    .toolbar{
      position: sticky; top: 0; z-index: 10;
      backdrop-filter: blur(10px);
      background: rgba(246,247,251,.86);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px;
      box-shadow: 0 8px 22px rgba(17,24,39,.06);
      margin-bottom: 12px;
    }
    .toolbarRow{
      display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between;
    }
    .brand{ display:flex; align-items:center; gap:10px; min-width: 240px; }
    .dot{
      width: 10px; height: 10px; border-radius: 999px;
      background: rgba(17,24,39,.55);
    }
    .brand h1{ font-size: 14px; margin:0; letter-spacing:.2px; }
    .brand p{ margin:0; font-size: 12px; color: var(--muted); }

    .controls{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; justify-content:flex-end; }
    .btn, .seg button, select{
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 9px 10px;
      border-radius: 12px;
      font-size: 13px;
      cursor:pointer;
      box-shadow: 0 10px 18px rgba(17,24,39,.04);
    }
    .btn.primary{
      background: rgba(17,24,39,.92);
      color:#fff;
      border-color: rgba(17,24,39,.22);
    }
    .btn:active{ transform: translateY(1px); }

    .seg{
      display:flex; gap:6px; padding: 6px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,.7);
    }
    .seg button{
      box-shadow:none;
      border-radius: 12px;
      border: 1px solid transparent;
      padding: 8px 10px;
      background: transparent;
      color: var(--muted);
      white-space:nowrap;
    }
    .seg button.active{
      background: rgba(17,24,39,.06);
      color: var(--ink);
      border-color: rgba(17,24,39,.12);
    }

    /* 出圖區 */
    #capture{
      border-radius: var(--radius);
      background: rgba(255,255,255,.9);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .capHead{
      padding: 16px 16px 12px;
      background: rgba(17,24,39,.03);
      border-bottom: 1px solid var(--line);
    }
    .capTitle{
      display:flex; gap:10px; align-items:flex-start; justify-content:space-between; flex-wrap:wrap;
    }
    .capTitle h2{ margin:0; font-size: 18px; letter-spacing: .2px; }
    .capTitle .sub{ margin-top: 4px; font-size: 12px; color: var(--muted); }

    .capBody{ padding: 12px 12px 16px; }

    .grid{ display:grid; grid-template-columns: 1fr; gap: 10px; }
    @media (min-width: 860px){ .grid{ grid-template-columns: 1fr 1fr; } }

    .card{
      position:relative;
      background: rgba(255,255,255,.98);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      overflow:hidden;
    }
    .card::before{
      content:"";
      position:absolute; left:0; top:0; bottom:0; width: 6px;
      background: rgba(17,24,39,.25);
    }
    .rowTop{
      display:flex; gap:10px; align-items:flex-start; justify-content:space-between;
      padding-left: 6px;
    }
    .date{ font-weight: 800; letter-spacing: .2px; font-size: 14px; }
    .tagline{ margin-top: 2px; font-size: 12px; color: var(--muted); }
    .badge{
      font-size: 12px;
      padding: 5px 8px;
      border-radius: 999px;
      border: 1px solid rgba(17,24,39,.16);
      background: rgba(17,24,39,.05);
      color: rgba(17,24,39,.82);
      white-space:nowrap;
      height: fit-content;
    }
    .title{ margin: 8px 0 6px 6px; font-size: 15px; font-weight: 800; letter-spacing: .2px; }

    .meta{ margin-left: 6px; display:flex; flex-wrap:wrap; gap:6px; }
    .pill{
      font-size: 12px;
      padding: 5px 8px;
      border-radius: 999px;
      border: 1px solid rgba(17,24,39,.10);
      background: rgba(17,24,39,.03);
      color: #374151;
    }

    .bullets{
      margin: 10px 0 0 6px;
      padding: 0 0 0 18px;
      color: #111827;
      font-size: 13px;
      line-height: 1.55;
    }
    .bullets li{ margin: 4px 0; }

    body.compact .bullets{ display:none; }
    body.compact .tagline{ display:none; }

    .toast{
      position: fixed; left: 50%; bottom: 18px;
      transform: translateX(-50%);
      background: rgba(17,24,39,.92);
      color: #fff;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 13px;
      opacity: 0; pointer-events:none;
      transition: opacity .2s ease;
    }
    .toast.show{ opacity: 1; }
  </style>
</head>

      pills: ["火鍋備料", "湯底加購", "家庭客"],
      note: "不放假；但『想吃熱的』理由很強，適合做備料組合",
      bullets: [
        "冬至備料組：湯底＋肉品/海鮮（固定組最好推）",
        "加購：調味料/配料（把客單往上推）",
        "預購：提早預訂享折抵，備貨更穩"
      ]
    },
    {
      date: "12/25（五）～12/27（日）",
      badge: "3 天連假",
      title: "行憲紀念日連假（年末採買/送禮）",
      pills: ["禮組", "企業量購", "滿額折抵"],
      note: "連假 3 天；可做年末禮組與企業量購級距",
      bullets: [
        "年末禮組：酒＋肉品＋調味料（2–3 段價位帶）",
        "企業/團購：量價級距＋分批到貨/取貨",
        "滿額折抵：用折抵取代贈品，成本更穩"
      ]
    },
    {
      date: "12/31（四）",
      badge: "年末節點",
      title: "跨年（聚會採買收尾）",
      pills: ["最後一波", "組合價", "短效券"],
      note: "不放假；以『聚會採買』組合收尾最直接",
      bullets: [
        "聚會組合：海鮮/肉品/酒類做固定組（少品項、好備貨）",
        "限時加碼：指定品類折抵（不做全館）",
        "短效券：發跨到元旦後的短效券，延續回購"
      ]
    }
  ];

  function renderCards(targetId, items){
    const el = document.getElementById(targetId);
    el.innerHTML = items.map(it => `
      <article class="card">
        <div class="rowTop">
          <div>
            <div class="date">${it.date}</div>
            <div class="tagline">假期/檔期說明：${it.note}</div>
          </div>
          <div class="badge">${it.badge}</div>
        </div>

        <div class="title">${it.title}</div>

        <div class="meta">
          ${it.pills.map(p => `<span class="pill">${p}</span>`).join("")}
        </div>

        <ul class="bullets">
          ${it.bullets.map(b => `<li>${b}</li>`).join("")}
        </ul>
      </article>
    `).join("");
  }
  renderCards("panelA", dataA);
  renderCards("panelB", dataB);
  renderCards("panelC", dataC);

  // Tab
  const tabA = document.getElementById("tabA");
  const tabB = document.getElementById("tabB");
  const tabC = document.getElementById("tabC");
  const panelA = document.getElementById("panelA");
  const panelB = document.getElementById("panelB");
  const panelC = document.getElementById("panelC");
  const capH2 = document.getElementById("capH2");

  function setTab(which){
    const isA = which === "A";
    const isB = which === "B";
    const isC = which === "C";
    tabA.classList.toggle("active", isA);
    tabB.classList.toggle("active", isB);
    tabC.classList.toggle("active", isC);

    panelA.style.display = isA ? "grid" : "none";
    panelB.style.display = isB ? "grid" : "none";
    panelC.style.display = isC ? "grid" : "none";

    capH2.textContent = isA
      ? "上半段（3–5月）｜檔期重點與優惠方向"
      : isB
        ? "下半段（6–9月）｜檔期重點與優惠方向"
        : "中秋後（9/25–12月）｜檔期重點與優惠方向";
  }
  tabA.addEventListener("click", ()=>setTab("A"));
  tabB.addEventListener("click", ()=>setTab("B"));
  tabC.addEventListener("click", ()=>setTab("C"));

  // Compact
  document.getElementById("toggleCompact").addEventListener("click", ()=>{
    document.body.classList.toggle("compact");
  });

  // Toast
  const toast = document.getElementById("toast");
  function showToast(msg){
    toast.textContent = msg || "已產出";
    toast.classList.add("show");
    setTimeout(()=>toast.classList.remove("show"), 1400);
  }

  // Shot (JPG, smaller)
  document.getElementById("btnShot").addEventListener("click", async ()=>{
    const capture = document.getElementById("capture");
    const scale = Number(document.getElementById("scale").value || 2);

    showToast("出圖中…");
    await new Promise(r=>requestAnimationFrame(r));

    const canvas = await html2canvas(capture, {
      backgroundColor: "#ffffff",
      scale,
      useCORS: true,
      windowWidth: document.documentElement.clientWidth
    });

    const a = document.createElement("a");
    const tabName =
      tabA.classList.contains("active") ? "上半段_3-5月"
      : tabB.classList.contains("active") ? "下半段_6-9月"
      : "中秋後_9-12月";
    const compact = document.body.classList.contains("compact") ? "精簡" : "詳細";

    a.download = `檔期企劃_${tabName}_${compact}_${new Date().toISOString().slice(0,10)}.jpg`;
    a.href = canvas.toDataURL("image/jpeg", 0.92);
    a.click();

    showToast("已下載 JPG");
  });
</script>
</body>
</html>
