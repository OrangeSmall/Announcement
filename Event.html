<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>門市活動排程</title>
  
  <!-- 引入 Tailwind CSS 來處理樣式 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 Babel 讓瀏覽器可以讀懂 React/JSX 語法 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- 引入 html-to-image 負責更精準的一鍵截圖功能 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>

  <style>
    /* 乾淨的和紙紋理背景 */
    body {
      background-color: #fcf9f5;
      background-image: url('https://www.transparenttextures.com/patterns/rice-paper-2.png');
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    /* 乾淨的輕柔陰影 */
    .clean-shadow {
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03), 0 1px 3px rgba(0,0,0,0.02);
    }

    /* 廠商色條 / 標籤 */
    .vendor-wrap {
      border-left: 10px solid transparent;
      padding-left: 10px;
    }

    .vendor-chip {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      font-weight: 900;
      font-size: 1.15em;
      letter-spacing: .5px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      border: 1px solid rgba(255,255,255,0.55);
      margin-bottom: 6px;
      line-height: 1.2;
    }

    .vendor-chip-sm {
      font-size: 0.95em;
      padding: 4px 10px;
    }

    .vendor-chip-xs {
      font-size: 0.82em;
      padding: 3px 8px;
    }

    .vendor-stripe {
      border-left: 10px solid transparent;
      padding-left: 12px;
    }
  </style>
</head>
<body class="overflow-x-hidden text-[#5c3a3e] font-serif">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    // --- 1. 雲端資料庫初始化 ---
    const firebaseConfig = {
      apiKey: "AIzaSyAT9nmcxVI-1J4pTXMhvfXmFzYJlaQR3HM",
      authDomain: "my-leave-calendar-50cfa.firebaseapp.com",
      projectId: "my-leave-calendar-50cfa",
      storageBucket: "my-leave-calendar-50cfa.firebasestorage.app",
      messagingSenderId: "37489112070",
      appId: "1:37489112070:web:3d68bb273b7ac438297f87"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const boardAppId = 'store-tasting-events-board'; 

    // --- 2. 輔助函數 ---
    const formatDate = (year, month, day) => `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
    const getFirstDayOfMonth = (year, month) => new Date(year, month, 1).getDay();
    const WEEKDAYS = ['日', '一', '二', '三', '四', '五', '六'];

    // === 廠商同名同色（高對比色盤，跨日期 / 跨店別一致）===
    const VENDOR_PALETTE = [
      '#1D4ED8', '#DC2626', '#059669', '#7C3AED', '#C2410C',
      '#0E7490', '#BE185D', '#4D7C0F', '#334155', '#B45309',
      '#2563EB', '#A21CAF', '#047857', '#B91C1C', '#0F766E',
      '#9333EA', '#EA580C', '#16A34A'
    ];

    const vendorThemeCache = new Map();

    const normalizeVendorName = (name) => {
      return String(name || '').replace(/\u3000/g, ' ').replace(/\s+/g, ' ').trim().toLowerCase();
    };

    const hashString = (str) => {
      let h = 0;
      for (let i = 0; i < str.length; i++) {
        h = ((h << 5) - h) + str.charCodeAt(i);
        h |= 0;
      }
      return Math.abs(h);
    };

    const hexToRgb = (hex) => {
      const m = String(hex).replace('#', '').match(/.{1,2}/g);
      if (!m) return { r: 0, g: 0, b: 0 };
      const [r, g, b] = m.map(x => parseInt(x, 16));
      return { r, g, b };
    };

    const rgbaFromHex = (hex, a) => {
      const { r, g, b } = hexToRgb(hex);
      return `rgba(${r},${g},${b},${a})`;
    };

    const readableTextColor = (hex) => {
      const { r, g, b } = hexToRgb(hex);
      const lum = (0.2126 * r + 0.7152 * g + 0.0722 * b) / 255;
      return lum > 0.55 ? '#111111' : '#FFFFFF';
    };

    const getVendorTheme = (vendorName) => {
      const key = normalizeVendorName(vendorName);
      if (!key) {
        return {
          bg: '#9CA3AF',
          soft: 'rgba(156,163,175,0.18)',
          border: 'rgba(156,163,175,0.35)',
          chipText: '#111111',
          timeBg: 'rgba(156,163,175,0.14)'
        };
      }

      if (vendorThemeCache.has(key)) return vendorThemeCache.get(key);

      const idx = hashString(key) % VENDOR_PALETTE.length;
      const bg = VENDOR_PALETTE[idx];
      const theme = {
        bg,
        soft: rgbaFromHex(bg, 0.18),
        border: rgbaFromHex(bg, 0.38),
        chipText: readableTextColor(bg),
        timeBg: rgbaFromHex(bg, 0.14)
      };

      vendorThemeCache.set(key, theme);
      return theme;
    };

    const storeShort = (store) => (store === '四維店' ? '四' : '北');
    const storeFull = (store) => (store === '四維店' ? '四維' : '北高');

    // --- 3. React 主要元件 ---
    function App() {
      const [user, setUser] = useState(null);
      const [isSyncing, setIsSyncing] = useState(true);
      const [isExporting, setIsExporting] = useState(false);

      const [currentDate, setCurrentDate] = useState(new Date());
      const [events, setEvents] = useState({}); 
      const [campaigns, setCampaigns] = useState([]); 
      
      const [viewMode, setViewMode] = useState('mobile');

      // 每日活動 Modal 狀態
      const [selectedDate, setSelectedDate] = useState(null);
      const [formData, setFormData] = useState({
        id: '', vendor: '', store: '四維店', status: '洽談中', times: [''], desc: '', registrar: ''
      });

      // 檔期活動 Modal 狀態
      const [showCampaignModal, setShowCampaignModal] = useState(false);
      const [campaignData, setCampaignData] = useState({
        id: '', name: '', startDate: '', endDate: '', store: '全門市', desc: ''
      });

      // Firebase 驗證與同步
      useEffect(() => {
        const initAuth = async () => {
          try { await signInAnonymously(auth); } catch (error) { console.error("驗證失敗:", error); }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        const docRef = doc(db, 'artifacts', boardAppId, 'public', 'data', 'tasting_calendar', 'shared_board');
        const unsubscribe = onSnapshot(docRef, (docSnap) => {
          setIsSyncing(false);
          if (docSnap.exists()) {
            setEvents(docSnap.data().events || {});
            setCampaigns(docSnap.data().campaigns || []); 
          } else {
            setDoc(docRef, { events: {}, campaigns: [] });
          }
        });
        return () => unsubscribe();
      }, [user]);

      const updateCloudData = async (newEvents, newCampaigns) => {
        if (!user) return;
        const docRef = doc(db, 'artifacts', boardAppId, 'public', 'data', 'tasting_calendar', 'shared_board');
        await setDoc(docRef, { events: newEvents, campaigns: newCampaigns }, { merge: true });
      };

      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const daysInMonth = getDaysInMonth(year, month);
      const firstDay = getFirstDayOfMonth(year, month);

      const prevMonth = () => setCurrentDate(new Date(year, month - 1, 1));
      const nextMonth = () => setCurrentDate(new Date(year, month + 1, 1));

      // --- 每日活動表單處理 ---
      const resetForm = () => {
        setFormData({ id: '', vendor: '', store: '四維店', status: '洽談中', times: [''], desc: '', registrar: '' });
      };

      const openModal = (dateStr) => {
        setSelectedDate(dateStr);
        resetForm();
      };
      const closeModal = () => setSelectedDate(null);

      const handleFormChange = (e) => setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));

      const handleSaveEvent = (e) => {
        e.preventDefault();
        if (!formData.vendor || !formData.registrar) { alert("「活動廠商」與「登記人」為必填！"); return; }
        
        const normalizedTimes = (formData.times || []).map(t => String(t || '').trim()).filter(Boolean);
        const dateEvents = events[selectedDate] ? [...events[selectedDate]] : [];
        const newEvent = { ...formData, id: formData.id || Date.now().toString(), times: normalizedTimes };

        if (formData.id) {
          const index = dateEvents.findIndex(ev => ev.id === formData.id);
          if (index > -1) dateEvents[index] = newEvent;
        } else { dateEvents.push(newEvent); }

        const newEventsState = { ...events, [selectedDate]: dateEvents };
        setEvents(newEventsState);
        updateCloudData(newEventsState, campaigns);
        resetForm();
      };

      const handleEditEvent = (event) => setFormData({ ...event, times: event.times?.length > 0 ? event.times : (event.time ? [event.time] : ['']) });

      const handleDeleteEvent = (eventId) => {
        if (!window.confirm("確定刪除此排程？")) return;
        const dateEvents = events[selectedDate].filter(ev => ev.id !== eventId);
        const newEventsState = { ...events, [selectedDate]: dateEvents };
        if (dateEvents.length === 0) delete newEventsState[selectedDate]; 
        setEvents(newEventsState);
        updateCloudData(newEventsState, campaigns);
        resetForm();
      };

      const handleTimeChange = (index, value) => {
        const newTimes = [...formData.times];
        newTimes[index] = value;
        setFormData(prev => ({ ...prev, times: newTimes }));
      };
      const addTimeSlot = () => formData.times.length < 3 && setFormData(prev => ({ ...prev, times: [...prev.times, ''] }));
      const removeTimeSlot = (index) => {
        const newTimes = formData.times.filter((_, i) => i !== index);
        setFormData(prev => ({ ...prev, times: newTimes.length ? newTimes : [''] }));
      };

      const handleClearMonth = () => {
        const monthPrefix = `${year}-${String(month + 1).padStart(2, '0')}`;
        if (!Object.keys(events).some(date => date.startsWith(monthPrefix))) { alert("當月無排程可清除！"); return; }
        
        // 新增：密碼驗證防呆機制
        const password = window.prompt("⚠️ 安全驗證：\n此動作將清空當月所有每日駐點活動。\n請輸入清除密碼：");
        if (password === null) return; // 按下取消
        if (password !== "0704") {
          alert("❌ 密碼錯誤，清除動作已取消！");
          return;
        }

        if (!window.confirm(`✅ 密碼正確。\n最後確認：確定要「清空」 ${year}年${month + 1}月 的所有活動嗎？(此動作無法復原)`)) return;
        
        const newEvents = { ...events };
        Object.keys(newEvents).forEach(date => { if (date.startsWith(monthPrefix)) delete newEvents[date]; });
        setEvents(newEvents);
        updateCloudData(newEvents, campaigns);
      };

      // --- 檔期活動表單處理 ---
      const handleCampaignChange = (e) => setCampaignData(prev => ({ ...prev, [e.target.name]: e.target.value }));
      const openCampaignModal = (campaign = null) => {
        if (campaign) setCampaignData(campaign);
        else setCampaignData({ id: '', name: '', startDate: '', endDate: '', store: '全門市', desc: '' });
        setShowCampaignModal(true);
      };
      
      const saveCampaign = (e) => {
        e.preventDefault();
        if (!campaignData.name || !campaignData.startDate || !campaignData.endDate) { alert("名稱與日期為必填！"); return; }
        const newCampaign = { ...campaignData, id: campaignData.id || `camp_${Date.now()}` };
        const newCampaignsList = campaignData.id 
          ? campaigns.map(c => c.id === campaignData.id ? newCampaign : c)
          : [...campaigns, newCampaign];
        
        newCampaignsList.sort((a, b) => new Date(a.endDate) - new Date(b.endDate));
        setCampaigns(newCampaignsList);
        updateCloudData(events, newCampaignsList);
        setShowCampaignModal(false);
      };

      const deleteCampaign = (id) => {
        if (!window.confirm("確定刪除此檔期資訊？")) return;
        const newCampaignsList = campaigns.filter(c => c.id !== id);
        setCampaigns(newCampaignsList);
        updateCloudData(events, newCampaignsList);
        setShowCampaignModal(false);
      };

      // --- 匯出功能 ---
      const exportOverviewImage = async () => {
        setIsExporting(true);
        try {
          await new Promise(resolve => setTimeout(resolve, 300)); 
          const element = document.getElementById('overview-export-area');
          if (!element) return;
          const dataUrl = await window.htmlToImage.toPng(element, { pixelRatio: 2, backgroundColor: '#fcf9f5', style: { transform: 'scale(1)', transformOrigin: 'top left' } });
          const link = document.createElement('a');
          link.download = `門市活動排程_${year}年${month + 1}月.png`;
          link.href = dataUrl;
          link.click();
        } catch (error) { alert("圖片產生失敗，請稍後再試。"); } finally { setIsExporting(false); }
      };

      const exportToCSV = () => {
        let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; 
        csvContent += "活動日期,店別,活動廠商,活動狀態,活動時間,活動內容大綱,登記人\n";
        const monthPrefix = `${year}-${String(month + 1).padStart(2, '0')}`;
        const monthEvents = [];
        Object.keys(events).forEach(date => {
          if (date.startsWith(monthPrefix)) events[date].forEach(ev => monthEvents.push({ date, ...ev }));
        });
        monthEvents.sort((a, b) => a.date.localeCompare(b.date));
        monthEvents.forEach(ev => {
          const timeString = ev.times?.length > 0 ? ev.times.filter(t => t.trim() !== '').join(' / ') : (ev.time || '');
          const row = [ev.date, ev.store, ev.vendor, ev.status, timeString, (ev.desc || '').replace(/\n/g, ' '), ev.registrar].map(field => `"${field}"`).join(","); 
          csvContent += row + "\n";
        });
        const link = document.createElement("a");
        link.setAttribute("href", encodeURI(csvContent));
        link.setAttribute("download", `門市活動排程統計_${year}年${month + 1}月.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      // --- 渲染：檔期活動資訊面板 (側邊欄) ---
      const renderCampaignSidebar = () => {
        // 取得當前觀看月份的頭尾時間
        const viewStart = new Date(year, month, 1);
        const viewEnd = new Date(year, month + 1, 0, 23, 59, 59);
        
        const activeCampaigns = campaigns.filter(c => {
          if (!c.startDate || !c.endDate) return false;
          const [sYear, sMonth, sDay] = c.startDate.split('-');
          const cStart = new Date(sYear, sMonth - 1, sDay);
          const [eYear, eMonth, eDay] = c.endDate.split('-');
          const cEnd = new Date(eYear, eMonth - 1, eDay, 23, 59, 59);
          
          // 只要檔期的開始時間在月底前，且結束時間在月初後，就代表這檔期在這個月有進行
          return cStart <= viewEnd && cEnd >= viewStart;
        });

        return (
          <div className="w-full xl:w-80 flex-shrink-0 bg-white/90 rounded-2xl p-5 border border-[#e8d5d7] clean-shadow flex flex-col h-full">
            <div className="flex justify-between items-center mb-4 border-b-2 border-[#e8d5d7] pb-3">
              <h3 className="text-xl font-black text-[#5c3a3e] flex items-center gap-2">📢 檔期活動資訊</h3>
              <button onClick={() => openCampaignModal()} className="text-xs bg-white text-[#c97a84] hover:bg-[#c97a84] hover:text-white transition-colors px-2 py-1.5 rounded-lg border border-[#c97a84] font-bold shadow-sm">+ 新增檔期</button>
            </div>
            
            <div className="flex-grow flex flex-col gap-3 overflow-y-auto no-scrollbar pb-2">
              {activeCampaigns.length === 0 ? (
                <div className="text-center text-[#c97a84] text-sm py-8 border border-dashed border-[#e8d5d7] rounded-xl bg-[#faf7f7]">目前無進行中的檔期活動</div>
              ) : (
                activeCampaigns.map(c => (
                  <div key={c.id} onClick={() => openCampaignModal(c)} className="p-3 bg-white border border-[#e8d5d7] rounded-xl shadow-sm cursor-pointer hover:border-[#c97a84] hover:shadow-md transition-all group relative">
                    <div className="flex justify-between items-start mb-1">
                      <div className="font-bold text-[#5c3a3e] pr-4">{c.name}</div>
                      <span className="text-[10px] font-bold bg-[#faf7f7] text-[#5c3a3e] px-1.5 py-0.5 rounded whitespace-nowrap border border-[#e8d5d7]">{c.store}</span>
                    </div>
                    <div className="text-[11px] font-bold text-[#c97a84] mb-1.5 bg-[#fcf3f4] inline-block px-1.5 py-0.5 rounded">
                      {c.startDate.replace(/-/g, '/')} ~ {c.endDate.replace(/-/g, '/')}
                    </div>
                    {c.desc && <div className="text-[11px] text-[#8a6b5c] leading-snug line-clamp-2">{c.desc}</div>}
                    <div className="absolute top-3 right-3 opacity-0 group-hover:opacity-100 text-[#c97a84] text-xs">✏️</div>
                  </div>
                ))
              )}
            </div>
          </div>
        );
      };

      // --- 渲染：電腦版 (月曆網格) ---
      const renderDesktopGrid = () => {
        const cells = [];
        for (let i = 0; i < firstDay; i++) {
          cells.push(<div key={`empty-${i}`} className="bg-[#faf7f7] border-r border-b border-[#ebdadd]"></div>);
        }

        for (let day = 1; day <= daysInMonth; day++) {
          const dateStr = formatDate(year, month, day);
          const isWeekend = (firstDay + day - 1) % 7 === 0 || (firstDay + day - 1) % 7 === 6;
          const dayEvents = events[dateStr] || [];
          
          cells.push(
            <div 
              key={day} 
              onClick={() => openModal(dateStr)}
              className="min-h-[120px] p-2 border-r border-b border-[#ebdadd] bg-white hover:bg-[#fcf3f4] cursor-pointer transition-colors flex flex-col relative group"
            >
              <div className="flex justify-between items-start mb-1">
                <span className={`text-lg font-bold ${isWeekend ? 'text-[#d96675]' : 'text-[#5c3a3e]'}`}>{day}</span>
                <span className="opacity-0 group-hover:opacity-100 text-xs text-[#c97a84] bg-white border border-[#ebdadd] px-1.5 py-0.5 rounded-full transition-opacity shadow-sm">+ 新增</span>
              </div>
              
              <div className="flex-grow flex flex-col gap-1 overflow-y-auto max-h-[90px] no-scrollbar">
                {dayEvents.map((ev) => {
                  const theme = getVendorTheme(ev.vendor);
                  return (
                    <div 
                      key={ev.id} 
                      className="text-[11px] px-2 py-1 rounded-full shadow-sm flex items-center gap-1 border max-w-full mb-1"
                      style={{ backgroundColor: theme.soft, borderColor: theme.border }}
                      title={`${ev.vendor}｜${ev.store}`}
                    >
                      <span className="font-black opacity-80 whitespace-nowrap">[{storeShort(ev.store)}]</span>
                      <span className="font-black truncate">{ev.vendor}</span>
                      {ev.status === '洽談中' && (
                        <span className="w-1.5 h-1.5 rounded-full flex-shrink-0" style={{ backgroundColor: theme.bg, opacity: 0.9 }} title="洽談中"></span>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        }

        const totalCells = cells.length;
        const remainingCells = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
        for (let i = 0; i < remainingCells; i++) cells.push(<div key={`empty-end-${i}`} className="bg-[#faf7f7] border-r border-b border-[#ebdadd]"></div>);

        return (
          <div className="overflow-x-auto pb-4 w-full">
            <div className="bg-white border-2 border-[#ebdadd] rounded-xl overflow-hidden shadow-sm min-w-[800px]">
              <div className="grid grid-cols-7 border-b-2 border-[#ebdadd] bg-[#fcf3f4]">
                {WEEKDAYS.map((day, idx) => (
                  <div key={day} className={`text-center py-4 font-bold text-lg border-r last:border-r-0 border-[#ebdadd] ${idx === 0 || idx === 6 ? 'text-[#d96675]' : 'text-[#5c3a3e]'}`}>{day}</div>
                ))}
              </div>
              <div className="grid grid-cols-7">{cells}</div>
            </div>
          </div>
        );
      };

      // --- 渲染：手機版 (直向條列) ---
      const renderMobileList = () => {
        const days = [];
        for (let day = 1; day <= daysInMonth; day++) {
          const dateStr = formatDate(year, month, day);
          const dateObj = new Date(year, month, day);
          const dayOfWeek = WEEKDAYS[dateObj.getDay()];
          const isWeekend = dateObj.getDay() === 0 || dateObj.getDay() === 6;
          const dayEvents = events[dateStr] || [];

          days.push(
            <div key={day} onClick={() => openModal(dateStr)} className="border-b last:border-b-0 border-[#ebdadd] p-4 flex flex-col gap-3 hover:bg-[#fcf3f4] cursor-pointer transition-colors bg-white">
              <div className="flex justify-between items-center border-b border-[#ebdadd]/50 pb-2">
                <div className="flex items-baseline gap-2">
                  <span className={`text-2xl font-black ${isWeekend ? 'text-[#d96675]' : 'text-[#5c3a3e]'}`}>{month + 1}/{day}</span>
                  <span className={`text-sm font-bold ${isWeekend ? 'text-[#d96675]' : 'text-[#8c5057]'}`}>({dayOfWeek})</span>
                </div>
                {dayEvents.length > 0 ? (
                  <span className="text-xs font-bold text-[#5c3a3e] bg-[#fcf3f4] border border-[#ebdadd] px-2.5 py-1 rounded-full shadow-sm">{dayEvents.length} 場活動</span>
                ) : (
                  <span className="text-xs font-bold text-[#c97a84] px-2 py-1 border border-dashed border-[#ebdadd] rounded-full">＋ 新增排程</span>
                )}
              </div>
              <div className="flex flex-col gap-2">
                {dayEvents.length === 0 ? (
                  <div className="text-sm text-[#c97a84] italic px-2 py-3 text-center bg-[#faf7f7] rounded-lg border border-dashed border-[#ebdadd]">本日無排程</div>
                ) : (
                  dayEvents.map(ev => {
                    const theme = getVendorTheme(ev.vendor);
                    const displayTimes = ev.times && ev.times.length > 0 ? ev.times.filter(t => t.trim() !== '') : (ev.time ? [ev.time] : []);
                    return (
                      <div key={ev.id} className="p-3 rounded-xl shadow-sm border" style={{ backgroundColor: theme.soft, borderColor: theme.border }}>
                        <div className="flex justify-between items-center mb-2 gap-2">
                          <span className="vendor-chip vendor-chip-sm" style={{ backgroundColor: theme.bg, color: theme.chipText }}>
                            [{storeFull(ev.store)}] {ev.vendor}
                          </span>
                          <span className={`text-[10px] font-bold px-2 py-0.5 rounded-md ${ev.status === '洽談中' ? 'bg-white/70 text-[#4a3b31]' : 'bg-[#8fb397]/70 text-white'}`}>
                            {ev.status === '洽談中' ? '洽談中' : '已確認'}
                          </span>
                        </div>
                        {displayTimes.length > 0 && (
                          <div className="text-xs font-medium opacity-90 mb-2 flex flex-wrap gap-2">
                            {displayTimes.map((t, idx) => <span key={idx} className="px-2 py-0.5 rounded inline-block border border-black/10" style={{ backgroundColor: theme.timeBg }}>🕒 {t}</span>)}
                          </div>
                        )}
                        <div className="text-[10px] opacity-75 mt-2 flex justify-end font-medium">登記: {ev.registrar}</div>
                      </div>
                    )
                  })
                )}
              </div>
            </div>
          );
        }
        return <div className="bg-white border-2 border-[#ebdadd] rounded-2xl overflow-hidden shadow-sm w-full">{days}</div>;
      };

      // --- 渲染：當月排程總覽 (專供閱讀與一鍵出圖) ---
      const renderOverviewList = () => {
        const monthPrefix = `${year}-${String(month + 1).padStart(2, '0')}`;
        const monthDates = Object.keys(events).filter(date => date.startsWith(monthPrefix)).sort();
        const hasDailyEvents = monthDates.some(date => events[date] && events[date].length > 0);

        // 取得當前觀看月份的頭尾時間
        const viewStart = new Date(year, month, 1);
        const viewEnd = new Date(year, month + 1, 0, 23, 59, 59);
        
        // 取得當月進行中的檔期
        const activeCampaigns = campaigns.filter(c => {
          if (!c.startDate || !c.endDate) return false;
          const [sYear, sMonth, sDay] = c.startDate.split('-');
          const cStart = new Date(sYear, sMonth - 1, sDay);
          const [eYear, eMonth, eDay] = c.endDate.split('-');
          const cEnd = new Date(eYear, eMonth - 1, eDay, 23, 59, 59);
          
          return cStart <= viewEnd && cEnd >= viewStart;
        });

        if (!hasDailyEvents && activeCampaigns.length === 0) {
          return (
            <div className="text-center py-16 bg-[#faf7f7] border-2 border-dashed border-[#ebdadd] rounded-2xl w-full">
              <p className="text-xl text-[#c97a84] font-bold">當月目前尚無任何活動排程 🌸</p>
            </div>
          );
        }

        return (
          <div className="relative w-full">
            <div className="flex justify-end mb-4 relative z-10">
              <button onClick={exportOverviewImage} disabled={isExporting} className={`px-5 py-2.5 rounded-full font-bold transition-all border-2 flex items-center justify-center gap-2 shadow-sm ${isExporting ? 'bg-gray-400 border-gray-500 text-white cursor-not-allowed' : 'bg-[#c97a84] border-[#bd5e68] text-white hover:bg-[#b04a55]'}`}>
                {isExporting ? '📸 處理中...' : '📸 一鍵產生總覽圖檔'}
              </button>
            </div>
            
            <div id="overview-export-area" className="bg-white border-2 border-[#ebdadd] p-6 md:p-10 rounded-2xl shadow-sm relative overflow-hidden">
              <div className="text-center mb-8 border-b-2 border-dashed border-[#c97a84] pb-6 relative z-10">
                <h2 className="text-3xl font-black text-[#5c3a3e] tracking-widest">{year}年 {month + 1}月 門市活動總覽</h2>
              </div>
              
              {/* 檔期活動區塊 */}
              {activeCampaigns.length > 0 && (
                <div className="mb-8">
                  <h3 className="text-xl font-black text-[#5c3a3e] mb-4 flex items-center gap-2 border-l-4 border-[#c97a84] pl-3">
                    📢 檔期活動資訊
                  </h3>
                  <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                    {activeCampaigns.map(c => (
                      <div key={c.id} className="p-4 bg-[#faf7f7] border border-[#ebdadd] rounded-xl shadow-sm">
                        <div className="flex justify-between items-start mb-2">
                          <div className="font-bold text-[#5c3a3e] pr-4 text-base">{c.name}</div>
                          <span className="text-[10px] font-bold bg-white text-[#5c3a3e] px-2 py-1 rounded-full whitespace-nowrap border border-[#ebdadd] shadow-sm">{c.store}</span>
                        </div>
                        <div className="text-xs font-bold text-[#c97a84] mb-2 bg-white inline-block px-2 py-1 rounded-md border border-[#ebdadd]">
                          {c.startDate.replace(/-/g, '/')} ~ {c.endDate.replace(/-/g, '/')}
                        </div>
                        {c.desc && <div className="text-xs text-[#8a6b5c] leading-snug mt-1 pt-2 border-t border-[#ebdadd]/50">{c.desc}</div>}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* 每日駐點排程區塊 */}
              {hasDailyEvents && (
                <div>
                  <h3 className="text-xl font-black text-[#5c3a3e] mb-4 flex items-center gap-2 border-l-4 border-[#c97a84] pl-3">
                    📅 每日駐點排程
                  </h3>
                  <div className="space-y-6 relative z-10">
                    {monthDates.map(date => {
                      const dateObj = new Date(date);
                      const dayOfWeek = WEEKDAYS[dateObj.getDay()];
                      const dayEvents = events[date] || [];
                      const isWeekend = dateObj.getDay() === 0 || dateObj.getDay() === 6;
                      if(dayEvents.length === 0) return null;
                      
                      return (
                        <div key={date} className="flex flex-col md:flex-row gap-4 border-b border-[#ebdadd] pb-6 last:border-0 last:pb-0">
                          <div className="w-full md:w-28 lg:w-32 flex-shrink-0 flex items-center md:items-start gap-3 md:flex-col md:gap-1 border-l-4 border-[#c97a84] pl-3">
                            <span className={`text-2xl font-black ${isWeekend ? 'text-[#d96675]' : 'text-[#5c3a3e]'}`}>{month + 1}/{dateObj.getDate()}</span>
                            <span className="text-sm font-bold text-[#c97a84]">星期{dayOfWeek}</span>
                          </div>
                          <div className="flex-grow grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                            {dayEvents.map(ev => {
                              const theme = getVendorTheme(ev.vendor);
                              const displayTimes = ev.times && ev.times.length > 0 ? ev.times.filter(t => t.trim() !== '') : (ev.time ? [ev.time] : []);
                              return (
                                <div key={ev.id} className="p-4 rounded-xl border shadow-sm vendor-stripe" style={{ backgroundColor: theme.soft, borderColor: theme.border, borderLeftColor: theme.bg }}>
                                  <div className="flex justify-between items-start mb-2 gap-2">
                                    <span className="vendor-chip vendor-chip-sm" style={{ backgroundColor: theme.bg, color: theme.chipText }}>
                                      [{storeShort(ev.store)}] {ev.vendor}
                                    </span>
                                    <span className={`flex-shrink-0 text-[10px] font-bold px-2 py-1 rounded-md ${ev.status === '洽談中' ? 'bg-white/70 text-[#4a3b31]' : 'bg-[#8fb397] text-white'}`}>{ev.status}</span>
                                  </div>
                                  {displayTimes.length > 0 && (
                                    <div className="text-xs font-medium opacity-90 mb-2 flex flex-col gap-1">
                                      {displayTimes.map((t, idx) => <span key={idx} className="px-2 py-0.5 rounded-md inline-block w-fit border border-black/10" style={{ backgroundColor: theme.timeBg }}>🕒 {t}</span>)}
                                    </div>
                                  )}
                                  {ev.desc && <div className="text-xs mt-2 opacity-90 pt-2 border-t border-black/10 font-medium">{ev.desc}</div>}
                                </div>
                              )
                            })}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen p-4 md:p-6 lg:p-8 relative">
          <div className="max-w-[1400px] mx-auto relative z-10 flex flex-col gap-6">
            
            {/* 手機版 LOGO */}
            <div className="lg:hidden flex justify-center mb-1 drop-shadow-sm">
               <img src="https://raw.githubusercontent.com/OrangeSmall/seafood-menu-app/main/logo.png" crossOrigin="anonymous" alt="Logo" className="h-12 object-contain" />
            </div>

            {/* 頂部控制列 */}
            <div className="bg-white/90 backdrop-blur-md rounded-2xl p-4 border border-[#ebdadd] clean-shadow flex flex-col lg:flex-row justify-between items-center gap-4">
              <div className="flex flex-col md:flex-row items-center space-y-3 md:space-y-0 md:space-x-4 w-full lg:w-auto">
                <div className="flex bg-white p-1 rounded-full border border-[#ebdadd] shadow-sm w-full lg:w-auto justify-center">
                  <button onClick={() => setViewMode('mobile')} className={`flex-1 lg:flex-none px-4 py-1.5 rounded-full text-sm font-bold transition-all ${viewMode === 'mobile' ? 'bg-[#c97a84] text-white shadow' : 'text-[#c97a84] hover:bg-[#fcf3f4]'}`}>📱 手機版</button>
                  <button onClick={() => setViewMode('desktop')} className={`flex-1 lg:flex-none px-4 py-1.5 rounded-full text-sm font-bold transition-all ${viewMode === 'desktop' ? 'bg-[#c97a84] text-white shadow' : 'text-[#c97a84] hover:bg-[#fcf3f4]'}`}>💻 電腦版</button>
                  <button onClick={() => setViewMode('overview')} className={`flex-1 lg:flex-none px-4 py-1.5 rounded-full text-sm font-bold transition-all ${viewMode === 'overview' ? 'bg-[#c97a84] text-white shadow' : 'text-[#c97a84] hover:bg-[#fcf3f4]'}`}>📝 總覽</button>
                </div>
                <div className="flex items-center space-x-2 bg-white px-4 py-1.5 rounded-full border border-[#ebdadd] shadow-sm w-full justify-center md:w-auto">
                  <button onClick={prevMonth} className="text-2xl text-[#c97a84] hover:text-[#bd5e68] transition-colors px-2">◀</button>
                  <h2 className="text-xl font-black text-[#5c3a3e] tracking-widest px-2 whitespace-nowrap">{year}年 {month + 1}月</h2>
                  <button onClick={nextMonth} className="text-2xl text-[#c97a84] hover:text-[#bd5e68] transition-colors px-2">▶</button>
                </div>
              </div>

              <div className="flex flex-col md:flex-row items-center gap-3 w-full lg:w-auto">
                <div className="flex items-center text-sm font-bold text-[#c97a84] bg-white px-4 py-2 rounded-full border border-[#ebdadd] w-full md:w-auto justify-center shadow-sm">
                  {isSyncing ? <><span className="w-2 h-2 rounded-full bg-[#c97a84] mr-2 animate-pulse"></span> 連線中...</> : <><span className="w-2 h-2 rounded-full bg-green-500 mr-2 shadow-[0_0_5px_#22c55e]"></span> 即時同步</>}
                </div>
                <div className="flex gap-2 w-full md:w-auto">
                  <button onClick={exportToCSV} className="flex-1 md:flex-none px-4 py-2 rounded-full font-bold transition-all border border-[#ebdadd] bg-white text-[#c97a84] hover:bg-[#fcf3f4] shadow-sm text-sm">📊 匯出 CSV</button>
                  <button onClick={handleClearMonth} className="flex-1 md:flex-none px-4 py-2 rounded-full font-bold transition-all border border-[#ebdadd] bg-white text-[#c97a84] hover:bg-[#fcf3f4] shadow-sm text-sm">🗑️ 清除當月</button>
                </div>
                {/* 電腦版 LOGO */}
                <div className="hidden lg:block border-l-2 border-[#ebdadd] pl-4 ml-1">
                  <img src="https://raw.githubusercontent.com/OrangeSmall/seafood-menu-app/main/logo.png" crossOrigin="anonymous" alt="Logo" className="h-10 object-contain drop-shadow-sm" />
                </div>
              </div>
            </div>

            {/* 主體區塊 */}
            {viewMode === 'overview' ? (
              <div className="bg-white/90 backdrop-blur-md rounded-2xl overflow-hidden clean-shadow border border-[#ebdadd] p-4 md:p-6 lg:p-8">
                {renderOverviewList()}
              </div>
            ) : (
              <div className="flex flex-col xl:flex-row gap-6 items-start">
                
                {/* 左側日曆主體 */}
                <div className="bg-white/90 backdrop-blur-md rounded-2xl overflow-hidden clean-shadow border border-[#ebdadd] p-4 md:p-6 lg:p-8 flex-grow w-full xl:w-[calc(100%-340px)]">
                  <div className="text-center mb-6 relative">
                    <h1 className="text-3xl md:text-4xl font-black text-[#5c3a3e] drop-shadow-sm pb-3 border-b-2 border-dashed border-[#c97a84] inline-block px-4 md:px-12 tracking-wider">
                      門市活動排程表
                    </h1>
                  </div>
                  {viewMode === 'desktop' ? renderDesktopGrid() : renderMobileList()}
                </div>

                {/* 右側檔期看板 */}
                {renderCampaignSidebar()}
              </div>
            )}
          </div>

          {/* 每日活動 Modal */}
          {selectedDate && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-[#5c3a3e]/40 backdrop-blur-sm">
              <div className="bg-white border border-[#ebdadd] rounded-2xl shadow-xl w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col md:flex-row relative">
                <button onClick={closeModal} className="absolute top-4 right-5 text-2xl font-bold text-[#c97a84] hover:text-[#bd5e68] z-10 transition-colors">✕</button>

                <div className="w-full md:w-1/3 bg-[#faf7f7] border-b md:border-b-0 md:border-r border-[#ebdadd] p-6 overflow-y-auto">
                  <h3 className="text-xl font-black text-[#5c3a3e] mb-5 border-b-2 border-[#ebdadd] pb-2">📅 {selectedDate} 排程</h3>
                  {(!events[selectedDate] || events[selectedDate].length === 0) ? (
                    <div className="text-center mt-12 bg-white p-4 rounded-xl border border-dashed border-[#ebdadd]">
                      <p className="text-[#c97a84] font-bold">當日目前無活動</p>
                      <p className="text-sm text-[#8c5057] mt-1">請在右側表單新增排程</p>
                    </div>
                  ) : (
                    <div className="space-y-3">
                      {events[selectedDate].map(ev => {
                        const theme = getVendorTheme(ev.vendor);
                        const displayTimes = ev.times && ev.times.length > 0 ? ev.times.filter(t => t.trim() !== '') : (ev.time ? [ev.time] : []);
                        return (
                          <div 
                            key={ev.id} 
                            onClick={() => handleEditEvent(ev)} 
                            className={`p-4 rounded-xl border cursor-pointer transition-all hover:scale-[1.02] shadow-sm vendor-stripe ${formData.id === ev.id ? 'ring-2 ring-[#c0848a] shadow-md' : ''}`}
                            style={{ backgroundColor: theme.soft, borderColor: theme.border, borderLeftColor: theme.bg }}
                          >
                            <div className="flex justify-between items-start mb-2 gap-2">
                              <span className="vendor-chip vendor-chip-sm" style={{ backgroundColor: theme.bg, color: theme.chipText }}>{ev.vendor}</span>
                              <span className={`text-xs px-2 py-1 rounded-md bg-white/70 text-black/70 font-bold`}>{ev.store}</span>
                            </div>
                            {displayTimes.length > 0 ? (
                              <div className="text-[11px] font-medium opacity-90 mb-3 flex flex-col gap-0.5">{displayTimes.map((t, idx) => <span key={idx}>🕒 {t}</span>)}</div>
                            ) : <div className="text-[11px] font-medium opacity-90 mb-3">🕒 未定時間</div>}
                            <div className="flex justify-between items-center mt-2 border-t border-black/10 pt-2">
                              <span className={`text-xs font-bold px-2 py-1 rounded-md ${ev.status === '洽談中' ? 'bg-white/60' : 'bg-[#8fb397]/40'}`}>{ev.status === '洽談中' ? '💬 洽談中' : '✅ 已確認'}</span>
                              <span className="text-xs opacity-80 font-bold">📝 {ev.registrar}</span>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>

                <div className="w-full md:w-2/3 p-6 md:p-8 overflow-y-auto bg-white">
                  <h3 className="text-2xl font-black text-[#5c3a3e] mb-6 flex items-center gap-3 flex-wrap">
                    {formData.id ? '✏️ 編輯活動' : '✨ 新增活動排程'}
                    {formData.id && <button onClick={resetForm} className="text-sm bg-white text-[#c97a84] border border-[#ebdadd] px-3 py-1 rounded-full font-bold hover:bg-[#fcf3f4] transition-colors ml-auto shadow-sm">+ 改為新增</button>}
                  </h3>
                  <form onSubmit={handleSaveEvent} className="space-y-5">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                      <div><label className="block text-sm font-bold text-[#5c3a3e] mb-1.5">活動廠商 <span className="text-[#c97a84]">*</span></label><input type="text" name="vendor" value={formData.vendor} onChange={handleFormChange} required placeholder="如：統一企業" className="w-full p-2.5 border border-[#ebdadd] rounded-xl bg-[#faf7f7] focus:ring-2 focus:ring-[#c97a84] focus:bg-white focus:outline-none" /></div>
                      <div><label className="block text-sm font-bold text-[#5c3a3e] mb-1.5">登記人 <span className="text-[#c97a84]">*</span></label><input type="text" name="registrar" value={formData.registrar} onChange={handleFormChange} required placeholder="您的姓名" className="w-full p-2.5 border border-[#ebdadd] rounded-xl bg-[#faf7f7] focus:ring-2 focus:ring-[#c97a84] focus:bg-white focus:outline-none" /></div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                      <div><label className="block text-sm font-bold text-[#5c3a3e] mb-1.5">活動店別</label><select name="store" value={formData.store} onChange={handleFormChange} className="w-full p-2.5 border border-[#ebdadd] rounded-xl bg-[#faf7f7] font-bold text-[#5c3a3e] focus:ring-2 focus:ring-[#c97a84]"><option value="四維店">四維店</option><option value="北高店">北高店</option></select></div>
                      <div><label className="block text-sm font-bold text-[#5c3a3e] mb-1.5">活動狀態</label><select name="status" value={formData.status} onChange={handleFormChange} className="w-full p-2.5 border border-[#ebdadd] rounded-xl bg-[#faf7f7] font-bold text-[#5c3a3e] focus:ring-2 focus:ring-[#c97a84]"><option value="洽談中">💬 洽談中</option><option value="已確認">✅ 已確認</option></select></div>
                    </div>
                    <div className="bg-[#faf7f7] p-4 rounded-xl border border-[#ebdadd]">
                      <div className="flex justify-between items-end mb-3">
                        <label className="block text-sm font-bold text-[#5c3a3e]">活動時間 (最多3個時段)</label>
                        {formData.times.length < 3 && <button type="button" onClick={addTimeSlot} className="text-xs text-[#c97a84] font-bold bg-white px-2 py-1 border border-[#ebdadd] rounded-full shadow-sm hover:bg-[#fcf3f4]">➕ 新增時段</button>}
                      </div>
                      <div className="space-y-3">
                        {formData.times.map((timeValue, index) => (
                          <div key={index} className="flex items-center gap-2">
                            <span className="text-[#c97a84] text-xs font-bold w-4">{index + 1}.</span>
                            <input type="text" value={timeValue} onChange={(e) => handleTimeChange(index, e.target.value)} placeholder={index === 0 ? "例: 11:00-13:00" : "新增其他時段..."} className="w-full p-2 border border-[#ebdadd] rounded-lg text-sm focus:ring-2 focus:ring-[#c97a84] focus:outline-none" />
                            {formData.times.length > 1 && <button type="button" onClick={() => removeTimeSlot(index)} className="p-1.5 text-[#c97a84] hover:bg-[#fcf3f4] rounded-md">✕</button>}
                          </div>
                        ))}
                      </div>
                    </div>
                    <div><label className="block text-sm font-bold text-[#5c3a3e] mb-1.5">活動內容大綱</label><textarea name="desc" value={formData.desc} onChange={handleFormChange} rows="3" placeholder="簡述試吃品項..." className="w-full p-2.5 border border-[#ebdadd] rounded-xl resize-none bg-[#faf7f7] focus:ring-2 focus:ring-[#c97a84] focus:bg-white focus:outline-none"></textarea></div>
                    <div className="pt-6 mt-2 flex justify-between items-center border-t border-[#ebdadd] flex-wrap gap-4">
                      {formData.id ? <button type="button" onClick={() => handleDeleteEvent(formData.id)} className="px-4 py-2.5 bg-white text-[#c97a84] border border-[#c0848a] rounded-full font-bold shadow-sm hover:bg-[#fcf3f4] w-full md:w-auto">刪除此活動</button> : <div className="hidden md:block"></div>}
                      <div className="flex gap-3 w-full md:w-auto">
                        <button type="button" onClick={closeModal} className="w-1/3 md:w-auto px-5 py-2.5 bg-white border border-[#ebdadd] text-[#5c3a3e] rounded-full font-bold shadow-sm hover:bg-[#faf7f7]">取消</button>
                        <button type="submit" className="w-2/3 md:w-auto px-6 py-2.5 bg-[#c97a84] text-white rounded-full font-bold shadow-md hover:bg-[#bd5e68]">{formData.id ? '💾 儲存修改' : '➕ 新增排程'}</button>
                      </div>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          )}

          {/* 檔期活動 Modal */}
          {showCampaignModal && (
            <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-[#5c3a3e]/40 backdrop-blur-sm">
              <div className="bg-white border border-[#ebdadd] rounded-2xl shadow-xl w-full max-w-md p-6 relative">
                <button onClick={() => setShowCampaignModal(false)} className="absolute top-4 right-5 text-2xl font-bold text-[#c97a84] hover:text-[#bd5e68] z-10 transition-colors">✕</button>
                <h3 className="text-2xl font-black text-[#5c3a3e] mb-6 border-b-2 border-[#ebdadd] pb-3">
                  {campaignData.id ? '✏️ 編輯檔期' : '✨ 新增檔期活動'}
                </h3>
                <form onSubmit={saveCampaign} className="space-y-4">
                  <div><label className="block text-sm font-bold text-[#5c3a3e] mb-1.5">檔期名稱 <span className="text-[#c97a84]">*</span></label><input type="text" name="name" value={campaignData.name} onChange={handleCampaignChange} required placeholder="如：春季特賞大促" className="w-full p-2.5 border border-[#ebdadd] rounded-xl bg-[#faf7f7] focus:ring-2 focus:ring-[#c97a84] focus:bg-white focus:outline-none" /></div>
                  <div className="grid grid-cols-2 gap-4">
                    <div><label className="block text-sm font-bold text-[#5c3a3e] mb-1.5">開始日期 <span className="text-[#c97a84]">*</span></label><input type="date" name="startDate" value={campaignData.startDate} onChange={handleCampaignChange} required className="w-full p-2 border border-[#ebdadd] rounded-xl text-sm bg-[#faf7f7] focus:ring-2 focus:ring-[#c97a84] focus:bg-white focus:outline-none" /></div>
                    <div><label className="block text-sm font-bold text-[#5c3a3e] mb-1.5">結束日期 <span className="text-[#c97a84]">*</span></label><input type="date" name="endDate" value={campaignData.endDate} onChange={handleCampaignChange} required className="w-full p-2 border border-[#ebdadd] rounded-xl text-sm bg-[#faf7f7] focus:ring-2 focus:ring-[#c97a84] focus:bg-white focus:outline-none" /></div>
                  </div>
                  <div><label className="block text-sm font-bold text-[#5c3a3e] mb-1.5">活動門市</label><input type="text" name="store" value={campaignData.store} onChange={handleCampaignChange} placeholder="如：全門市、僅四維店" className="w-full p-2.5 border border-[#ebdadd] rounded-xl text-sm bg-[#faf7f7] focus:ring-2 focus:ring-[#c97a84] focus:bg-white focus:outline-none" /></div>
                  <div><label className="block text-sm font-bold text-[#5c3a3e] mb-1.5">備註說明</label><textarea name="desc" value={campaignData.desc} onChange={handleCampaignChange} rows="2" placeholder="簡述檔期重點..." className="w-full p-2.5 border border-[#ebdadd] rounded-xl resize-none bg-[#faf7f7] focus:ring-2 focus:ring-[#c97a84] focus:bg-white focus:outline-none"></textarea></div>
                  <div className="pt-4 flex justify-between items-center border-t border-[#ebdadd]">
                    {campaignData.id ? <button type="button" onClick={() => deleteCampaign(campaignData.id)} className="px-4 py-2 bg-white text-[#c97a84] border border-[#ebdadd] rounded-full font-bold shadow-sm text-sm hover:bg-[#fcf3f4]">刪除</button> : <div></div>}
                    <div className="flex gap-2">
                      <button type="button" onClick={() => setShowCampaignModal(false)} className="px-4 py-2 bg-white border border-[#ebdadd] text-[#5c3a3e] rounded-full font-bold shadow-sm text-sm hover:bg-[#faf7f7]">取消</button>
                      <button type="submit" className="px-5 py-2 bg-[#c97a84] text-white rounded-full font-bold shadow-md text-sm hover:bg-[#bd5e68]">儲存檔期</button>
                    </div>
                  </div>
                </form>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
