<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>餐飲排班系統原型</title>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- html2canvas 用於匯出圖片 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: #f3f4f6; }
        .grid-table { display: grid; grid-template-columns: 120px repeat(30, minmax(40px, 1fr)); }
        .sticky-col { position: sticky; left: 0; z-index: 10; background: white; }
        .sticky-header { position: sticky; top: 0; z-index: 20; background: #f9fafb; }
        .sticky-corner { position: sticky; top: 0; left: 0; z-index: 30; background: #f9fafb; }
        
        /* 自定義捲軸 */
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* 隱藏特定區域捲軸但保留滑動功能 (適用手機版) */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- 初始預設資料定義 ---
        const DEFAULT_EMPLOYEES = [
            { id: 'store_1', name: '林尚正', dept: '門市', conflict: 'store_2' },
            { id: 'store_2', name: '陳光庭', dept: '門市', conflict: 'store_1' },
            { id: 'store_3', name: '吳佳陵', dept: '門市', conflict: null },
            { id: 'store_4', name: '吳佩潔', dept: '門市', conflict: null },
            { id: 'store_5', name: '林佩妡', dept: '門市', conflict: null },
            { id: 'store_6', name: '馮麗平', dept: '門市', conflict: null },
            { id: 'store_7', name: '陳南鶯', dept: '內場', conflict: null }, 
            { id: 'store_8', name: '辛瑄祺', dept: '門市', conflict: null },
            { id: 'kitchen_1', name: '霍磊', dept: '內場', conflict: 'kitchen_2' },
            { id: 'kitchen_2', name: '吳東紘', dept: '內場', conflict: 'kitchen_1' },
            { id: 'kitchen_3', name: '羅紫寧', dept: '內場', conflict: null },
            { id: 'kitchen_4', name: '歐哲銘', dept: '內場', conflict: null },
            { id: 'kitchen_5', name: '吳淑娟', dept: '內場', conflict: null },
        ];

        const SHIFT_TYPES = {
            'work': { label: '出勤', color: 'bg-green-100 text-green-800 border-green-300', short: '班' },
            'leave_li': { label: '例假', color: 'bg-red-100 text-red-800 border-red-300', short: '例' },
            'leave_xiu': { label: '休假', color: 'bg-orange-100 text-orange-800 border-orange-300', short: '休' },
            'empty_rest': { label: '空班(休)', color: 'bg-blue-100 text-blue-800 border-blue-300', short: '空' },
            'empty_work': { label: '空班(勤)', color: 'bg-purple-100 text-purple-800 border-purple-300', short: '空勤' },
            'none': { label: '未排', color: 'bg-gray-50 text-gray-400 border-gray-200', short: '-' }
        };

        // --- 雲端庫設定 ---
        const API_URL = 'https://script.google.com/macros/s/AKfycbzpmhBN1J7voF-yshK1GZ67vi7Op20z74uQ55ujpiQWnTseBTLMmZb-caRhwCkFDRk/exec'; 

        // --- 主應用程式 ---
        function App() {
            const [activeTab, setActiveTab] = useState('schedule'); 
            const [toast, setToast] = useState(null);
            
            // --- 員工清單狀態 ---
            const [employees, setEmployees] = useState(DEFAULT_EMPLOYEES);
            const [currentUser, setCurrentUser] = useState(DEFAULT_EMPLOYEES[0].id); 
            
            // --- 雲端同步狀態 ---
            const [isSyncing, setIsSyncing] = useState(false);
            const [lastSyncTime, setLastSyncTime] = useState(new Date().toLocaleTimeString());

            // --- 自定義 Confirm Modal ---
            const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, message: '', onConfirm: null });
            
            // --- 異常提示 ---
            const [anomalies, setAnomalies] = useState([]);

            // --- 月份與時間狀態 ---
            const [currentDate, setCurrentDate] = useState(new Date()); 
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth() + 1;
            const daysInMonth = new Date(year, month, 0).getDate();
            const monthKey = `${year}-${month.toString().padStart(2, '0')}`;

            // --- 全域資料狀態 (支援跨月) ---
            const [globalMaxLeave, setGlobalMaxLeave] = useState(3); 
            const [allSchedules, setAllSchedules] = useState({}); 
            const [allDaySettings, setAllDaySettings] = useState({}); 
            const [minStaffSettings, setMinStaffSettings] = useState({}); 

            // 取得當前月份的資料
            const currentSchedule = allSchedules[monthKey] || {};
            const currentDaySettings = allDaySettings[monthKey] || {};

            // 確保切換 Tab 或是員工資料變動時重新繪製 Icons
            useEffect(() => {
                setTimeout(() => lucide.createIcons(), 100);
            }, [activeTab, employees]);

            // --- 雲端資料抓取 (GET) ---
            const fetchCloudData = async () => {
                if (!API_URL) return; 
                try {
                    const res = await fetch(API_URL);
                    const json = await res.json();
                    if (json.status === 'success' && json.data) {
                        if (json.data.allSchedules) setAllSchedules(json.data.allSchedules);
                        if (json.data.allDaySettings) setAllDaySettings(json.data.allDaySettings);
                        if (json.data.minStaffSettings) setMinStaffSettings(json.data.minStaffSettings);
                        if (json.data.employees) {
                            setEmployees(json.data.employees);
                            // 確保當前選擇的使用者依然存在，否則切換到第一個
                            if (!json.data.employees.find(e => e.id === currentUser)) {
                                setCurrentUser(json.data.employees[0]?.id || '');
                            }
                        }
                        setLastSyncTime(new Date().toLocaleTimeString());
                    }
                } catch (error) {
                    console.error("Fetch Error:", error);
                }
            };

            // --- 雲端資料儲存 (POST) ---
            const saveToCloud = async (key, value) => {
                if (!API_URL) return;
                setIsSyncing(true);
                try {
                    await fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify({ key, value }),
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                    });
                    setLastSyncTime(new Date().toLocaleTimeString());
                } catch (error) {
                    console.error("Save Error:", error);
                    showToast('雲端儲存失敗，請檢查網路連線');
                } finally {
                    setIsSyncing(false);
                }
            };

            // --- 初始載入與每 15 秒輪詢 ---
            useEffect(() => {
                fetchCloudData();
                const interval = setInterval(fetchCloudData, 15000);
                return () => clearInterval(interval);
            }, []);

            // 確保當前月份的班表有被初始化
            useEffect(() => {
                if (!allSchedules[monthKey]) {
                    const initialSchedule = {};
                    for (let d = 1; d <= daysInMonth; d++) {
                        initialSchedule[d] = {};
                        employees.forEach(emp => {
                            initialSchedule[d][emp.id] = 'none';
                        });
                    }
                    setAllSchedules(prev => ({ ...prev, [monthKey]: initialSchedule }));
                }
            }, [monthKey, daysInMonth, allSchedules, employees]);

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(null), 3000);
            };

            // --- 員工分類與分隔線處理 ---
            const storeEmployees = employees.filter(e => e.dept === '門市');
            const kitchenEmployees = employees.filter(e => e.dept === '內場');
            const otherEmployees = employees.filter(e => e.dept !== '門市' && e.dept !== '內場');
            
            const displayRows = [];
            if (storeEmployees.length > 0) displayRows.push(...storeEmployees);
            if (storeEmployees.length > 0 && kitchenEmployees.length > 0) displayRows.push({ isDivider: true, label: '內場區域' });
            if (kitchenEmployees.length > 0) displayRows.push(...kitchenEmployees);
            if ((storeEmployees.length > 0 || kitchenEmployees.length > 0) && otherEmployees.length > 0) displayRows.push({ isDivider: true, label: '其他區域' });
            if (otherEmployees.length > 0) displayRows.push(...otherEmployees);

            // --- 員工管理功能 ---
            const handleEmployeeChange = (id, field, value) => {
                const newEmployees = employees.map(emp => 
                    emp.id === id ? { ...emp, [field]: value } : emp
                );
                setEmployees(newEmployees);
                saveToCloud('employees', newEmployees);
            };

            const handleAddEmployee = () => {
                const newEmp = {
                    id: `emp_${Date.now()}`,
                    name: '新員工',
                    dept: '門市',
                    conflict: null
                };
                const newEmployees = [...employees, newEmp];
                setEmployees(newEmployees);
                saveToCloud('employees', newEmployees);
                showToast('已新增員工，請修改姓名與設定');
            };

            const handleDeleteEmployee = (id) => {
                const empName = employees.find(e => e.id === id)?.name;
                setConfirmDialog({
                    isOpen: true,
                    message: `確定要刪除員工「${empName}」嗎？此操作將會將該員工從名單中移除。`,
                    onConfirm: () => {
                        const newEmployees = employees.filter(e => e.id !== id);
                        // 清除其他人的錯休設定如果是指向這位被刪除的員工
                        const cleanedEmployees = newEmployees.map(e => 
                            e.conflict === id ? { ...e, conflict: null } : e
                        );
                        setEmployees(cleanedEmployees);
                        saveToCloud('employees', cleanedEmployees);
                        setConfirmDialog({ isOpen: false, message: '', onConfirm: null });
                        showToast(`已刪除員工 ${empName}`);
                    }
                });
            };

            // 最低出勤人數 Getter/Setter
            const getMinStaff = (dept, day) => {
                const monthSettings = minStaffSettings[monthKey] || { store: {}, kitchen: {} };
                if (monthSettings[dept]?.[day] !== undefined) return monthSettings[dept][day];
                
                const dateObj = new Date(year, month - 1, day);
                const isWeekend = dateObj.getDay() === 0 || dateObj.getDay() === 6;
                const isHoliday = currentDaySettings[day]?.isHoliday;
                const isRedDay = isWeekend || isHoliday;
                
                if (dept === 'store') return isRedDay ? 5 : 4;
                if (dept === 'kitchen') return isRedDay ? 4 : 3;
                return 0;
            };

            const updateMinStaff = (dept, day, value) => {
                setMinStaffSettings(prev => {
                    const newState = {
                        ...prev,
                        [monthKey]: {
                            ...(prev[monthKey] || { store: {}, kitchen: {} }),
                            [dept]: {
                                ...((prev[monthKey] || {})[dept] || {}),
                                [day]: Number(value)
                            }
                        }
                    };
                    saveToCloud('minStaffSettings', newState);
                    return newState;
                });
            };

            // 取得某天某部門的休假人數與名單
            const getLeaveData = (scheduleData, day, dept) => {
                if (!scheduleData[day]) return { count: 0, emps: [] };
                let emps = [];
                employees.filter(e => e.dept === dept).forEach(e => {
                    const status = scheduleData[day][e.id];
                    if (['leave_li', 'leave_xiu', 'empty_rest'].includes(status)) {
                        emps.push(e);
                    }
                });
                return { count: emps.length, emps };
            };

            // 跨月連休檢查函數
            const isDayLeaveGlobal = (scheduleData, targetYear, targetMonth, targetDay, empId) => {
                const date = new Date(targetYear, targetMonth - 1, targetDay);
                const mKey = `${date.getFullYear()}-${(date.getMonth() + 1).toString().padStart(2, '0')}`;
                const tDay = date.getDate();
                if (mKey === monthKey) {
                    return ['leave_li', 'leave_xiu', 'empty_rest'].includes(scheduleData[tDay]?.[empId]);
                }
                const s = allSchedules[mKey]?.[tDay]?.[empId];
                return ['leave_li', 'leave_xiu', 'empty_rest'].includes(s);
            };

            // 員工選假邏輯 (手動調整)
            const handleEmployeeRequest = (day, type) => {
                const daySetting = currentDaySettings[day] || {};
                if (daySetting.isBanned && type !== 'none') {
                    alert(`該日禁止排休，原因：${daySetting.banReason}`);
                    return;
                }

                const emp = employees.find(e => e.id === currentUser);
                const currentType = currentSchedule[day]?.[currentUser] || 'none';
                
                if (type === 'none') {
                    updateSchedule(day, currentUser, 'none');
                    return;
                }

                const isLeave = ['leave_li', 'leave_xiu', 'empty_rest'].includes(type);
                const wasLeave = ['leave_li', 'leave_xiu', 'empty_rest'].includes(currentType);
                
                if (isLeave && !wasLeave && getLeaveData(currentSchedule, day, emp.dept).count >= globalMaxLeave) {
                    alert(`${emp.dept} 當天休假人數已達上限 (${globalMaxLeave}人)`);
                    return;
                }

                if (isLeave) {
                    const tempSchedule = { ...currentSchedule };
                    tempSchedule[day] = { ...tempSchedule[day], [currentUser]: type };
                    
                    const d1 = isDayLeaveGlobal(tempSchedule, year, month, day - 2, currentUser);
                    const d2 = isDayLeaveGlobal(tempSchedule, year, month, day - 1, currentUser);
                    const d3 = true; 
                    const d4 = isDayLeaveGlobal(tempSchedule, year, month, day + 1, currentUser);
                    const d5 = isDayLeaveGlobal(tempSchedule, year, month, day + 2, currentUser);

                    // 檢查連續三天休假
                    if ((d1 && d2 && d3) || (d2 && d3 && d4) || (d3 && d4 && d5)) {
                        alert('排班規定：禁止選擇連續3天休假！');
                        return;
                    }

                    // 檢查休假後必須出勤兩天的規定 (不可休-勤-休)
                    if ((d1 && !d2 && d3) || (d3 && !d4 && d5)) {
                        alert('排班規定：休假後必須至少出勤兩天才能再次排休！');
                        return;
                    }
                }

                updateSchedule(day, currentUser, type);
            };

            const updateSchedule = (day, empId, type) => {
                setAllSchedules(prev => {
                    const monthData = prev[monthKey] || {};
                    const dayData = monthData[day] || {};
                    const newState = { ...prev, [monthKey]: { ...monthData, [day]: { ...dayData, [empId]: type } } };
                    saveToCloud('allSchedules', newState);
                    return newState;
                });
            };

            // 一鍵清除本月班表
            const requestClearSchedule = () => {
                setConfirmDialog({
                    isOpen: true,
                    message: `確定要清除 ${year}年 ${month}月 的所有排班紀錄嗎？此操作無法復原。`,
                    onConfirm: () => {
                        setAllSchedules(prev => {
                            const monthData = {};
                            for (let d = 1; d <= daysInMonth; d++) {
                                monthData[d] = {};
                                employees.forEach(emp => { monthData[d][emp.id] = 'none'; });
                            }
                            const newState = { ...prev, [monthKey]: monthData };
                            saveToCloud('allSchedules', newState);
                            return newState;
                        });
                        setAnomalies([]);
                        setConfirmDialog({ isOpen: false, message: '', onConfirm: null });
                        showToast('已成功清除本月排班紀錄');
                    }
                });
            };

            // 高階自動排班邏輯
            const autoSchedule = () => {
                let monthData = JSON.parse(JSON.stringify(currentSchedule));
                let newAnomalies = [];

                const getPotentialWorkers = (d, dept) => {
                    return employees.filter(e => e.dept === dept).reduce((acc, e) => {
                        const s = monthData[d]?.[e.id];
                        if (['work', 'empty_work', 'none'].includes(s)) return acc + 1;
                        return acc;
                    }, 0);
                };

                const isLeaveType = (s) => ['leave_li', 'leave_xiu', 'empty_rest'].includes(s);

                // 動態處理特殊人員 (即便未來名稱變更或被刪除，也能安全過濾)
                const specialNames = ['林尚正', '陳光庭', '霍磊', '吳東紘'];
                const regularStaff = employees.filter(e => !specialNames.includes(e.name));
                const processOrder = [
                    ...regularStaff,
                    employees.find(e => e.name === '霍磊'),
                    employees.find(e => e.name === '吳東紘'),
                    employees.find(e => e.name === '林尚正'),
                    employees.find(e => e.name === '陳光庭')
                ].filter(Boolean); // 過濾掉找不到的人員

                processOrder.forEach(emp => {
                    const getCount = (t) => {
                        let c = 0;
                        for (let d = 1; d <= daysInMonth; d++) {
                            if (monthData[d]?.[emp.id] === t) c++;
                        }
                        return c;
                    };

                    const MAX_EMPTY_POOL = 4;
                    const TARGET_TOTAL_LEAVE = 10;

                    const placeLeaves = (type, amount) => {
                        let needed = amount;
                        let attempts = 0;

                        while (needed > 0 && attempts < 100) {
                            attempts++;
                            let bestDay = -1;
                            let bestScore = -999999;

                            for (let d = 1; d <= daysInMonth; d++) {
                                if (monthData[d]?.[emp.id] !== 'none') continue; 
                                if (currentDaySettings[d]?.isBanned) continue; 

                                let canPlace = true;

                                // 【絕對限制 1】: 不能造成連續 3 天休假
                                const lPrev1 = isLeaveType(monthData[d-1]?.[emp.id]);
                                const lPrev2 = d > 2 ? isLeaveType(monthData[d-2]?.[emp.id]) : false;
                                const lNext1 = isLeaveType(monthData[d+1]?.[emp.id]);
                                const lNext2 = d < daysInMonth - 1 ? isLeaveType(monthData[d+2]?.[emp.id]) : false;
                                
                                if ((lPrev1 && lPrev2) || (lPrev1 && lNext1) || (lNext1 && lNext2)) {
                                    canPlace = false;
                                }

                                // 【絕對限制 2】: 休假後一定需要出勤兩天 (避免休-勤-休)
                                if ((lPrev2 && !lPrev1) || (lNext2 && !lNext1)) {
                                    canPlace = false;
                                }

                                // 【絕對限制 3】: 每天最少上班人數
                                const deptKey = emp.dept === '門市' ? 'store' : 'kitchen';
                                const minReq = getMinStaff(deptKey, d);
                                const potential = getPotentialWorkers(d, emp.dept);
                                if (potential - 1 < minReq) {
                                    canPlace = false; 
                                }

                                // 【特殊原則】: 霍磊/吳東紘 互斥原則
                                const kitchen1 = employees.find(e => e.name === '霍磊');
                                const kitchen2 = employees.find(e => e.name === '吳東紘');
                                if (kitchen1 && kitchen2) {
                                    if (emp.id === kitchen1.id && isLeaveType(monthData[d]?.[kitchen2.id])) canPlace = false;
                                    if (emp.id === kitchen2.id && isLeaveType(monthData[d]?.[kitchen1.id])) canPlace = false;
                                }

                                if (!canPlace) continue;

                                // --- 計分制 (Soft Constraints) ---
                                let score = Math.random() * 10; 

                                // 【優先級】：避免超過 6 天連續上班
                                let streak = 0;
                                for (let p = d - 1; p >= Math.max(1, d - 6); p--) {
                                    const ps = monthData[p]?.[emp.id];
                                    if (ps === 'none' || ps === 'work' || ps === 'empty_work') {
                                        streak++;
                                    } else break;
                                }
                                if (streak >= 6) score += 10000;

                                // 【優先級】：錯休人員盡量錯開
                                if (emp.conflict) {
                                    const conflictEmp = employees.find(e => e.id === emp.conflict);
                                    if (conflictEmp && !isLeaveType(monthData[d]?.[conflictEmp.id])) {
                                        score += 5000;
                                    }
                                }

                                // 【優先級】：鼓勵連續休假 (最多2天)
                                if (lPrev1 || lNext1) {
                                    score += 3000;
                                }

                                // 【充裕人力優先排假】: 人數大於最低人數 3 人以上可優先安排
                                if (potential - 1 >= minReq + 3) score += 2000;
                                else if (potential - 1 >= minReq + 2) score += 1000;
                                else if (potential - 1 >= minReq + 1) score += 500;

                                if (score > bestScore) {
                                    bestScore = score;
                                    bestDay = d;
                                }
                            }

                            if (bestDay !== -1) {
                                monthData[bestDay][emp.id] = type;
                                needed--;
                            } else {
                                break; 
                            }
                        }
                        return needed; 
                    };

                    // 1. 先排滿基本 4 例 4 休
                    let missingLi = placeLeaves('leave_li', Math.max(0, 4 - getCount('leave_li')));
                    let missingXiu = placeLeaves('leave_xiu', Math.max(0, 4 - getCount('leave_xiu')));

                    // 2. 確保至少 1 天空班休
                    let currentEmptyRest = getCount('empty_rest');
                    if (currentEmptyRest < 1) {
                        let missingER = placeLeaves('empty_rest', 1);
                        if (missingER === 0) currentEmptyRest++;
                    }

                    // 3. 檢查並打斷超過 6 天的長班 (轉為空班休)
                    const checkAnyStreak = () => {
                        let currentStreak = 0;
                        for (let d = 1; d <= daysInMonth; d++) {
                            const s = monthData[d]?.[emp.id];
                            if (s === 'none' || s === 'work' || s === 'empty_work') {
                                currentStreak++;
                                if (currentStreak > 6) return true;
                            } else {
                                currentStreak = 0;
                            }
                        }
                        return false;
                    };

                    while (currentEmptyRest < MAX_EMPTY_POOL && checkAnyStreak()) {
                        let missingER = placeLeaves('empty_rest', 1);
                        if (missingER === 0) currentEmptyRest++;
                        else break; 
                    }

                    // 4. 盡可能將總休假天數補齊至 10 天
                    let currentTotalLeave = getCount('leave_li') + getCount('leave_xiu') + currentEmptyRest;
                    let extraAttempts = 0;
                    while (currentTotalLeave < TARGET_TOTAL_LEAVE && extraAttempts < 5) {
                        extraAttempts++;
                        // 優先用「休假」來補
                        if (placeLeaves('leave_xiu', 1) === 0) {
                            currentTotalLeave++;
                        } else if (currentEmptyRest < MAX_EMPTY_POOL) {
                            // 若一般休假塞不進去，嘗試用「空班休」補
                            if (placeLeaves('empty_rest', 1) === 0) {
                                currentEmptyRest++;
                                currentTotalLeave++;
                            } else {
                                break;
                            }
                        } else {
                            break;
                        }
                    }

                    // 記錄異常 (保留基礎配額的警告，以及未達 10 天的警告)
                    let finalLi = getCount('leave_li');
                    let finalXiu = getCount('leave_xiu');
                    if (finalLi < 4) newAnomalies.push(`${emp.name} 的 [例假] 未達基本 4 天 (缺 ${4 - finalLi} 天)`);
                    if (finalXiu < 4) newAnomalies.push(`${emp.name} 的 [休假] 未達基本 4 天 (僅 ${finalXiu} 天)`);
                    if (currentTotalLeave < TARGET_TOTAL_LEAVE) {
                        newAnomalies.push(`${emp.name} 總休假未達 10 天 (僅 ${currentTotalLeave} 天)`);
                    }

                    // 5. 剩餘的空班額度全部轉為空班勤
                    let emptyWorkTarget = MAX_EMPTY_POOL - currentEmptyRest - getCount('empty_work');
                    let availableDays = Array.from({length: daysInMonth}, (_,i)=>i+1).filter(d => monthData[d]?.[emp.id] === 'none');
                    availableDays.sort(() => Math.random() - 0.5); 
                    for(let d of availableDays) {
                        if (emptyWorkTarget <= 0) break;
                        monthData[d][emp.id] = 'empty_work';
                        emptyWorkTarget--;
                    }
                });

                // 將未排的日子填入出勤
                for (let d = 1; d <= daysInMonth; d++) {
                    if (!monthData[d]) monthData[d] = {};
                    employees.forEach(emp => {
                        if (monthData[d][emp.id] === 'none' || monthData[d][emp.id] === undefined) {
                            monthData[d][emp.id] = 'work';
                        }
                    });
                }

                // --- 產生異常報告 ---
                for (let d = 1; d <= daysInMonth; d++) {
                    let storeCount = 0; let kitchenCount = 0;
                    employees.forEach(emp => {
                        const s = monthData[d][emp.id];
                        if (s === 'work' || s === 'empty_work') {
                            emp.dept === '門市' ? storeCount++ : kitchenCount++;
                        }
                    });
                    const minS = getMinStaff('store', d);
                    const minK = getMinStaff('kitchen', d);
                    if (storeCount < minS) newAnomalies.push(`${month}/${d} 門市出勤人數不足 (實際:${storeCount}, 底線:${minS})`);
                    if (kitchenCount < minK) newAnomalies.push(`${month}/${d} 內場出勤人數不足 (實際:${kitchenCount}, 底線:${minK})`);
                }

                employees.forEach(emp => {
                    let consecutiveWork = 0;
                    for (let d = 1; d <= daysInMonth; d++) {
                        const s = monthData[d][emp.id];
                        if (s === 'work' || s === 'empty_work') {
                            consecutiveWork++;
                            if (consecutiveWork > 6) {
                                newAnomalies.push(`${emp.name} 連續上班超過 6 天 (發生於 ${month}/${d} 區間)`);
                                consecutiveWork = 0; 
                            }
                        } else {
                            consecutiveWork = 0;
                        }
                    }

                    const newState = { ...prev, [monthKey]: monthData };
                    saveToCloud('allSchedules', newState);
                    return newState;

                                            className={`
                                                h-[5.5rem] md:h-28 border rounded md:rounded-md p-1 md:p-2 flex flex-col cursor-pointer transition relative overflow-hidden
                                                ${status !== 'none' ? conf.color : 'bg-gray-50 hover:bg-gray-100 border-gray-200'}
                                                ${isBanned ? 'bg-red-50 border-red-200 cursor-not-allowed opacity-80' : ''}
                                                ${(isFull && !isBanned && status === 'none') ? 'opacity-60 cursor-not-allowed bg-gray-200' : ''}
                                            `}
                                        >
                                            {/* 日期與國定假日標籤 */}
                                            <div className="flex flex-col md:flex-row md:justify-between items-start md:items-center mb-0.5 md:mb-1">
                                                <span className={`font-semibold text-xs md:text-base leading-none mb-0.5 md:mb-0 ${isRedDay ? 'text-red-600' : ''}`}>
                                                    {day} {isHoliday && <span className="ml-0.5 md:ml-1 text-[8px] md:text-[10px] bg-red-100 text-red-600 px-1 py-0.5 rounded align-middle">國定</span>}
                                                </span>
                                                {status !== 'none' && <span className="text-[9px] md:text-xs px-1 md:px-1.5 py-0.5 rounded bg-white bg-opacity-70 font-bold leading-none">{conf.short}</span>}
                                            </div>

                                            {/* 禁休原因 */}
                                            {isBanned && (
                                                <div className="text-[8px] md:text-[10px] text-red-600 font-bold bg-red-100 rounded px-0.5 md:px-1 py-0.5 my-0.5 md:my-1 text-center truncate">
                                                    禁休: {dSetting.banReason}
                                                </div>
                                            )}

                                            {/* 活動標註 */}
                                            {activityNote && (
                                                <div className="text-[8px] md:text-[10px] text-blue-700 font-bold bg-blue-100 border border-blue-200 rounded px-0.5 md:px-1 py-0.5 my-0.5 text-center truncate" title={activityNote}>
                                                    {activityNote}
                                                </div>
                                            )}

                                            {/* 已排休人員預覽 */}
                                            <div className="flex-1 overflow-y-auto mt-0.5 md:mt-1 no-scrollbar">
                                                <div className="flex flex-wrap gap-0.5 md:gap-1">
                                                    {leaveData.emps.map(e => (
                                                        <span key={e.id} className={`text-[8px] md:text-[10px] px-0.5 md:px-1 rounded ${e.id === currentUser ? 'bg-blue-200 text-blue-800 font-bold' : 'bg-gray-200 text-gray-600'}`}>
                                                            {e.name}
                                                        </span>
                                                    ))}
                                                </div>
                                            </div>

                                            {/* 狀態列 */}
                                            <div className="text-[8px] md:text-[10px] text-right mt-0.5 md:mt-1 pt-0.5 md:pt-1 border-t border-black/5 leading-none">
                                                {isBanned ? (
                                                    <span className="text-red-500 font-bold">不可排休</span>
                                                ) : isFull && status === 'none' ? (
                                                    <span className="text-orange-500 font-bold">名額滿</span>
                                                ) : (
                                                    <span className="text-gray-500">休:{leaveData.count}/{globalMaxLeave}</span>
                                                )}
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>
                        </div>
                    </div>

                    {/* 選擇假別 Modal */}
                    {selectedDay && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-lg p-5 md:p-6 w-full max-w-[320px] shadow-xl">
                                <h3 className="text-base md:text-lg font-bold mb-4">選擇 {selectedDay} 日 班別</h3>
                                <div className="space-y-2.5 md:space-y-2">
                                    <button onClick={() => { onDayClick(selectedDay, 'empty_rest'); setSelectedDay(null); }} className="w-full text-left px-4 py-3 md:py-2 rounded hover:bg-blue-50 text-blue-700 border border-blue-200 text-sm md:text-base font-medium">空班 - 休息</button>
                                    <hr className="my-2 border-gray-100" />
                                    <button onClick={() => { onDayClick(selectedDay, 'none'); setSelectedDay(null); }} className="w-full text-left px-4 py-3 md:py-2 rounded hover:bg-gray-100 text-gray-600 border border-gray-300 text-sm md:text-base font-medium">取消排休 (清空)</button>
                                </div>
                                <div className="mt-5 md:mt-4 flex justify-end">
                                    <button onClick={() => setSelectedDay(null)} className="px-5 py-2.5 md:px-4 md:py-2 text-gray-500 hover:bg-gray-100 rounded text-sm md:text-base font-medium">關閉</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
    </script>
</body>
</html>
